<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야구 응원가 런치패드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  user-select: none;
}

header {
  background: #16213e;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 2px solid #0f3460;
  flex-wrap: wrap;
}
header h1 { font-size: 1.2rem; color: #e94560; white-space: nowrap; }

.header-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.btn-small {
  background: #0f3460; color: #eee; border: 1px solid #1a5276;
  border-radius: 6px; padding: 6px 12px; cursor: pointer;
  font-size: 0.8rem; transition: background 0.2s; white-space: nowrap;
}
.btn-small:hover { background: #1a5276; }

.main { display: flex; flex: 1; overflow: hidden; }

/* 왼쪽 패널 */
.left-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow-y: auto;
}

/* 플레이어 */
#player-wrap {
  background: #000; overflow: hidden;
  display: none; flex-shrink: 0;
}
#player-wrap.visible { display: block; }
#player-wrap iframe {
  display: block; width: 100%; aspect-ratio: 16/9; border: none;
}

/* 컨트롤 바 */
.control-bar {
  background: #16213e;
  padding: 10px 16px; display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap; flex-shrink: 0;
  border-bottom: 1px solid #0f3460;
}
.now-playing {
  flex: 1; font-size: 0.85rem; color: #aaa;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 100px;
}
.now-playing span { color: #e94560; font-weight: bold; }

.ctrl-btn {
  background: #0f3460; color: #eee; border: none; border-radius: 8px;
  padding: 8px 14px; cursor: pointer; font-size: 1rem;
  transition: background 0.2s, transform 0.1s;
}
.ctrl-btn:hover { background: #1a5276; }
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn.stop { background: #7b241c; }
.ctrl-btn.stop:hover { background: #a93226; }

.volume-group { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #aaa; }
input[type=range] { width: 80px; accent-color: #e94560; }

.toggle-btn {
  background: #0f3460; color: #aaa; border: 1px solid #1a5276;
  border-radius: 6px; padding: 6px 10px; cursor: pointer;
  font-size: 0.8rem; transition: background 0.2s, color 0.2s; white-space: nowrap;
}
.toggle-btn:hover, .toggle-btn.on { background: #1a5276; color: #fff; }

/* ── 그룹 탭 바 ── */
.group-tabs {
  display: flex; align-items: center; gap: 0;
  background: #16213e; border-bottom: 2px solid #0f3460;
  padding: 0 12px; overflow-x: auto; flex-shrink: 0;
}
.group-tab {
  position: relative;
  background: none; border: none; color: #aaa;
  padding: 10px 14px; cursor: pointer; font-size: 0.85rem;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: color 0.2s;
}
.group-tab:hover { color: #eee; }
.group-tab.active { color: #e94560; border-bottom-color: #e94560; }
.group-tab .tab-edit-icon {
  display: none; margin-left: 6px; opacity: 0.5; font-size: 0.7rem;
}
.group-tab:hover .tab-edit-icon { display: inline; }
.group-tab .tab-edit-icon:hover { opacity: 1; }

.add-group-btn {
  background: none; border: none; color: #555; padding: 10px 12px;
  cursor: pointer; font-size: 0.85rem; white-space: nowrap;
  transition: color 0.2s;
}
.add-group-btn:hover { color: #e94560; }

/* ── 런치패드 영역 ── */
.launchpad-area { padding: 16px; flex: 1; }

.launchpad-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.launchpad-header h2 { font-size: 0.9rem; color: #aaa; }
.grid-controls { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #aaa; }
.grid-controls select {
  background: #0f3460; color: #eee; border: 1px solid #1a5276;
  border-radius: 4px; padding: 3px 6px;
}

/* ── 섹션 구분자 (선발/벤치) ── */
.section-divider {
  font-size: 0.75rem; color: #e94560; font-weight: bold;
  padding: 6px 0 8px; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 8px;
}
.section-divider::after {
  content: ''; flex: 1; height: 1px; background: #0f3460;
}

.launchpad-grid { display: grid; gap: 10px; margin-bottom: 16px; }

/* ── 일반 패드 버튼 ── */
.pad-btn {
  position: relative; aspect-ratio: 1; border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 8px; text-align: center;
  transition: filter 0.1s, transform 0.1s, border-color 0.2s;
  font-size: 0.85rem; font-weight: bold; word-break: keep-all; overflow: hidden;
}
.pad-btn:hover { filter: brightness(1.2); border-color: rgba(255,255,255,0.4); }
.pad-btn:active { transform: scale(0.93); }
.pad-btn.playing {
  border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.5);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.4); }
  50%       { box-shadow: 0 0 18px rgba(255,255,255,0.8); }
}
.pad-btn.popup-mode { border-style: dashed; border-color: rgba(255,165,0,0.5); }
.pad-btn.empty {
  border-style: dashed; opacity: 0.35;
  font-size: 1.6rem; color: rgba(255,255,255,0.3);
}
.pad-btn.empty:hover { opacity: 0.6; }

.pad-label { font-size: 0.82rem; font-weight: bold; line-height: 1.2; pointer-events: none; }
.pad-time { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; pointer-events: none; }

.pad-badge {
  position: absolute; top: 4px; left: 4px;
  border-radius: 4px; padding: 1px 5px;
  font-size: 0.58rem; font-weight: bold; pointer-events: none; line-height: 1.6;
}
.pad-badge.popup { background: rgba(200,120,0,0.85); color: #fff; }
.pad-badge.order { background: rgba(0,0,0,0.5); color: #fff; }

.pad-edit-btn {
  position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.4);
  border: none; color: rgba(255,255,255,0.5); border-radius: 4px;
  width: 18px; height: 18px; font-size: 0.6rem; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.pad-btn:hover .pad-edit-btn { display: flex; }
.pad-edit-btn:hover { color: #fff; background: rgba(0,0,0,0.7); }

/* ── 선수 카드 (등장곡 있을 때) ── */
.player-card {
  position: relative; border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px; overflow: hidden; cursor: default;
  transition: border-color 0.2s;
  display: flex; flex-direction: column;
  aspect-ratio: 1;
}
.player-card:hover { border-color: rgba(255,255,255,0.35); }
.player-card.playing { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.5); animation: pulse 1.2s ease-in-out infinite; }
.player-card.entrance-playing { border-color: #f39c12; box-shadow: 0 0 12px rgba(243,156,18,0.7); }

.player-card-top {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 6px 8px; text-align: center;
}
.player-order-num {
  font-size: 0.7rem; color: rgba(255,255,255,0.6);
  font-weight: bold; align-self: flex-start;
}
.player-name {
  font-size: 0.85rem; font-weight: bold; line-height: 1.2; margin-top: 2px;
}

.player-card-actions {
  display: flex; border-top: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.player-action-btn {
  flex: 1; background: rgba(0,0,0,0.3); border: none; color: #eee;
  padding: 7px 4px; cursor: pointer; font-size: 0.68rem;
  transition: background 0.15s; display: flex;
  flex-direction: column; align-items: center; gap: 2px;
  line-height: 1;
}
.player-action-btn:hover { background: rgba(255,255,255,0.12); }
.player-action-btn:active { background: rgba(255,255,255,0.22); }
.player-action-btn + .player-action-btn { border-left: 1px solid rgba(255,255,255,0.1); }
.player-action-btn.entrance-active { background: rgba(243,156,18,0.25); }
.player-action-btn.cheer-active { background: rgba(46,204,113,0.25); }

.player-card .pad-edit-btn { display: none; }
.player-card:hover .pad-edit-btn { display: flex; }

/* ── 컨텍스트 메뉴 ── */
.ctx-menu {
  position: fixed; background: #1e2d4a; border: 1px solid #0f3460;
  border-radius: 8px; padding: 6px 0; z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); min-width: 140px;
}
.ctx-menu button {
  display: block; width: 100%; background: none; border: none;
  color: #eee; padding: 8px 16px; cursor: pointer; text-align: left;
  font-size: 0.82rem; transition: background 0.15s;
}
.ctx-menu button:hover { background: #0f3460; }
.ctx-menu button.danger { color: #e74c3c; }

/* 오른쪽 편집 패널 */
.right-panel {
  width: 300px; background: #16213e;
  border-left: 2px solid #0f3460; display: flex; flex-direction: column; overflow: hidden;
}
.panel-tab { display: flex; border-bottom: 2px solid #0f3460; }
.tab-btn {
  flex: 1; background: none; border: none; color: #aaa; padding: 10px;
  cursor: pointer; font-size: 0.82rem;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s;
}
.tab-btn.active { color: #e94560; border-bottom-color: #e94560; }
.tab-btn:hover { color: #eee; }

.panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; background: #0f3460; color: #eee;
  border: 1px solid #1a5276; border-radius: 6px;
  padding: 7px 10px; font-size: 0.82rem; outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #e94560; }

.color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch {
  width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #fff; }

.section-title {
  font-size: 0.78rem; color: #e94560; font-weight: bold;
  margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid #0f3460;
}
.slot-info {
  background: #0f3460; border-radius: 6px; padding: 8px 10px;
  font-size: 0.8rem; color: #aaa; margin-bottom: 12px;
}
.slot-info strong { color: #eee; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.btn-primary {
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  padding: 10px; width: 100%; cursor: pointer; font-size: 0.88rem;
  font-weight: bold; transition: background 0.2s; margin-top: 4px;
}
.btn-primary:hover { background: #c0392b; }
.btn-danger {
  background: #5d2525; color: #eee; border: none; border-radius: 8px;
  padding: 8px; width: 100%; cursor: pointer; font-size: 0.82rem;
  transition: background 0.2s; margin-top: 6px;
}
.btn-danger:hover { background: #922b21; }

.entrance-section {
  border: 1px solid #1a5276; border-radius: 8px;
  padding: 10px; margin-bottom: 12px;
}
.entrance-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; color: #aaa; margin-bottom: 0; cursor: pointer;
}
.entrance-toggle input[type=checkbox] { accent-color: #e94560; }
.entrance-fields { margin-top: 10px; }

.import-export-area textarea {
  width: 100%; height: 120px; background: #0a1628; color: #7fdbff;
  border: 1px solid #1a5276; border-radius: 6px; padding: 8px;
  font-size: 0.72rem; font-family: monospace; resize: vertical;
}

/* 토스트 */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333; color: #fff; padding: 10px 20px;
  border-radius: 8px; font-size: 0.85rem; opacity: 0;
  transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 768px) {
  .main { flex-direction: column; }
  .right-panel { width: 100%; border-left: none; border-top: 2px solid #0f3460; max-height: 360px; }
}
</style>
</head>
<body>

<header>
  <h1>⚾ 야구 응원가 런치패드</h1>
  <div class="header-controls">
    <button class="btn-small" onclick="addButtonToCurrentGroup()">+ 버튼 추가</button>
    <button class="btn-small" onclick="exportConfig()">내보내기</button>
    <button class="btn-small" onclick="triggerImport()">가져오기</button>
    <button class="btn-small" onclick="resetConfig()" style="color:#e74c3c">초기화</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importFromFile(event)">
  </div>
</header>

<div class="main">
  <div class="left-panel">

    <!-- 숨겨진 플레이어 -->
    <div id="player-wrap">
      <div id="player-container"></div>
    </div>

    <!-- 컨트롤 바 -->
    <div class="control-bar">
      <div class="now-playing" id="now-playing">재생 대기 중...</div>
      <button class="ctrl-btn" onclick="ctrlPause()" title="일시정지">⏸</button>
      <button class="ctrl-btn stop" onclick="ctrlStop()" title="정지">⏹</button>
      <div class="volume-group">
        🔊<input type="range" id="volume-slider" min="0" max="100" value="80" oninput="ctrlVolume(this.value)">
      </div>
      <button class="toggle-btn" id="player-toggle" onclick="togglePlayer()">📺 영상 보기</button>
    </div>

    <!-- 그룹 탭 바 -->
    <div class="group-tabs" id="group-tabs"></div>

    <!-- 런치패드 영역 -->
    <div class="launchpad-area">
      <div class="launchpad-header">
        <h2 id="current-group-name">런치패드</h2>
        <div class="grid-controls">
          열: <select id="grid-cols" onchange="setGridCols(this.value)">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
      </div>
      <div id="launchpad-content"></div>
    </div>

  </div>

  <!-- 오른쪽 편집 패널 -->
  <div class="right-panel">
    <div class="panel-tab">
      <button class="tab-btn active" onclick="switchTab('edit')">버튼 편집</button>
      <button class="tab-btn" onclick="switchTab('io')">가져오기/내보내기</button>
    </div>
    <div class="panel-body">

      <div class="tab-content active" id="tab-edit">
        <div id="edit-placeholder" style="color:#555;font-size:0.82rem;padding:20px 0;text-align:center;">
          버튼을 클릭하거나<br>✏ 아이콘을 눌러 편집하세요
        </div>
        <div id="edit-form" style="display:none">
          <div class="slot-info">편집 중: <strong id="edit-slot-label">-</strong></div>

          <div class="section-title">버튼 정보</div>
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="edit-label" placeholder="예: 공격 시작!" maxlength="20">
          </div>
          <div class="form-group">
            <label>소속 그룹</label>
            <select id="edit-group"></select>
          </div>
          <div class="form-group" id="edit-batting-order-group" style="display:none">
            <label>타순 (0=벤치, 1~9=선발)</label>
            <input type="number" id="edit-batting-order" min="0" max="9" placeholder="0">
          </div>

          <div class="section-title" id="cheer-section-title">응원가</div>
          <div class="form-group">
            <label>YouTube URL 또는 Video ID</label>
            <input type="text" id="edit-url" placeholder="https://youtu.be/xxxxx">
          </div>
          <div class="two-col">
            <div class="form-group">
              <label>시작 (mm:ss 또는 초)</label>
              <input type="text" id="edit-start" placeholder="0:30">
            </div>
            <div class="form-group">
              <label>종료 (mm:ss 또는 초)</label>
              <input type="text" id="edit-end" placeholder="1:00">
            </div>
          </div>

          <!-- 등장곡 섹션 (선수 그룹에서만 표시) -->
          <div class="entrance-section" id="entrance-section" style="display:none">
            <label class="entrance-toggle">
              <input type="checkbox" id="entrance-enabled" onchange="toggleEntranceFields()">
              🎵 등장곡 사용
            </label>
            <div class="entrance-fields" id="entrance-fields" style="display:none">
              <div class="form-group" style="margin-top:8px">
                <label>등장곡 YouTube URL</label>
                <input type="text" id="entrance-url" placeholder="https://youtu.be/xxxxx">
              </div>
              <div class="two-col">
                <div class="form-group">
                  <label>시작</label>
                  <input type="text" id="entrance-start" placeholder="0:00">
                </div>
                <div class="form-group">
                  <label>종료</label>
                  <input type="text" id="entrance-end" placeholder="0:30">
                </div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>색상</label>
            <div class="color-row" id="color-swatches"></div>
          </div>
          <button class="btn-primary" onclick="saveEdit()">저장</button>
          <button class="btn-danger" onclick="deleteButton()">이 버튼 삭제</button>
        </div>
      </div>

      <div class="tab-content" id="tab-io">
        <div class="section-title">JSON 내보내기</div>
        <div class="import-export-area">
          <textarea id="export-area" readonly placeholder="'JSON 생성' 버튼을 누르세요"></textarea>
        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="exportToTextarea()">JSON 생성</button>
        <button class="btn-small" style="width:100%;margin-top:6px;padding:8px" onclick="copyExport()">클립보드 복사</button>

        <div class="section-title" style="margin-top:20px">JSON 가져오기</div>
        <div class="import-export-area">
          <textarea id="import-area" placeholder="JSON을 붙여넣고 적용 버튼을 누르세요"></textarea>
        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="applyImport()">적용</button>
      </div>

    </div>
  </div>
</div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctx-menu" style="display:none"></div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════
const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71',
  '#1abc9c','#3498db','#9b59b6','#e91e63',
  '#ff5722','#00bcd4','#8bc34a','#607d8b',
];

// ══════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════
let config = { groups: [] };
let currentGroupId  = null;
let editingBtnId    = null;   // 현재 편집 중인 버튼 id
let activeInfo      = null;   // { groupId, btnId }
let pendingCheer    = null;   // { videoId, startSeconds, endSeconds, label } | null
const popupSet      = new Set();

// iframe 플레이어
let ytFrame    = null;
let frameReady = false;

// 팝업
let popupWin   = null;
let popupTimer = null;
let popupChainFn = null; // 팝업 닫힌 후 실행할 콜백

// ══════════════════════════════════════════════════
// YouTube IFrame API
// ══════════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function () {
  ytFrame = new YT.Player('player-container', {
    width: '100%', height: '100%',
    host: 'https://www.youtube-nocookie.com',
    playerVars: { autoplay: 0, rel: 0, modestbranding: 1, controls: 1 },
    events: {
      onReady(e) {
        frameReady = true;
        ctrlVolume(document.getElementById('volume-slider').value);
      },
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED) {
          // 등장곡 체인 처리
          if (pendingCheer) {
            const cheer = pendingCheer;
            pendingCheer = null;
            playVideoById(cheer, cheer.label);
          } else {
            setActiveInfo(null);
            updateNowPlaying(null);
          }
        }
      },
      onError(e) {
        const EMBED_BLOCKED = [101, 150];
        if (activeInfo) {
          const btn = findBtn(activeInfo.groupId, activeInfo.btnId);
          if (btn && EMBED_BLOCKED.includes(e.data)) {
            popupSet.add(btn.videoId);
            renderAll();
            openPopup(btn, pendingCheer ? () => {
              const cheer = pendingCheer; pendingCheer = null;
              openPopup(cheer, null);
              setActiveInfo(activeInfo); // keep playing indicator
              updateNowPlaying(cheer.label + ' (팝업)');
            } : null);
            showToast('삽입 불가 영상 → YouTube 팝업으로 재생합니다');
          } else {
            showToast(`재생 오류 (코드: ${e.data})`);
          }
        }
        pendingCheer = null;
        setActiveInfo(null);
        updateNowPlaying(null);
      },
    },
  });
};

(function () {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════════════
// 팝업 폴백
// ══════════════════════════════════════════════════
function openPopup(btnData, chainCb) {
  clearTimeout(popupTimer);
  popupChainFn = chainCb || null;
  try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}

  const start = Math.floor(btnData.startSeconds || 0);
  const url   = `https://www.youtube.com/watch?v=${btnData.videoId}&t=${start}s`;
  popupWin = window.open(url, 'yt-popup',
    'width=900,height=540,toolbar=0,menubar=0,location=1,resizable=1');

  const dur = (btnData.endSeconds || 0) - start;
  if (dur > 0) {
    popupTimer = setTimeout(() => {
      try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}
      if (popupChainFn) { popupChainFn(); popupChainFn = null; }
      else { setActiveInfo(null); updateNowPlaying(null); }
    }, dur * 1000);
  }
}

// ══════════════════════════════════════════════════
// 컨트롤
// ══════════════════════════════════════════════════
function ctrlPause() { if (frameReady) ytFrame.pauseVideo(); }

function ctrlStop() {
  pendingCheer = null;
  popupChainFn = null;
  if (frameReady) ytFrame.stopVideo();
  clearTimeout(popupTimer);
  try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}
  setActiveInfo(null);
  updateNowPlaying(null);
}

function ctrlVolume(v) { if (frameReady) ytFrame.setVolume(parseInt(v)); }

function togglePlayer() {
  const wrap = document.getElementById('player-wrap');
  const btn  = document.getElementById('player-toggle');
  const on   = wrap.classList.toggle('visible');
  btn.textContent = on ? '📺 영상 숨기기' : '📺 영상 보기';
  btn.classList.toggle('on', on);
}

// ══════════════════════════════════════════════════
// 재생 공통
// ══════════════════════════════════════════════════
function playVideoById(btnData, label) {
  if (popupSet.has(btnData.videoId)) {
    openPopup(btnData, null);
    updateNowPlaying(label + ' (팝업)');
    return;
  }
  if (!frameReady) { showToast('플레이어 준비 중입니다. 잠시 후 다시 눌러주세요.'); return; }
  ytFrame.loadVideoById({
    videoId:      btnData.videoId,
    startSeconds: btnData.startSeconds || 0,
    endSeconds:   btnData.endSeconds   || undefined,
  });
  updateNowPlaying(label);
}

// ── 일반 패드 클릭 ──
function handlePadClick(groupId, btnId) {
  const btn = findBtn(groupId, btnId);
  if (!btn) return;
  pendingCheer = null;
  openEditPanelByBtn(groupId, btnId);
  if (!btn.videoId) { showToast('먼저 YouTube URL을 설정하세요.'); return; }
  setActiveInfo({ groupId, btnId });
  playVideoById(btn, btn.label);
}

// ── 등장곡 클릭 ──
function handleEntranceClick(groupId, btnId) {
  const btn = findBtn(groupId, btnId);
  if (!btn || !btn.entrance || !btn.entrance.videoId) {
    handleCheerClick(groupId, btnId); return;
  }
  pendingCheer = { videoId: btn.videoId, startSeconds: btn.startSeconds, endSeconds: btn.endSeconds, label: btn.label };
  setActiveInfo({ groupId, btnId, mode: 'entrance' });
  playVideoById(btn.entrance, btn.label + ' (등장)');
  renderAll();
}

// ── 응원가 클릭 ──
function handleCheerClick(groupId, btnId) {
  const btn = findBtn(groupId, btnId);
  if (!btn || !btn.videoId) { showToast('먼저 YouTube URL을 설정하세요.'); return; }
  pendingCheer = null;
  setActiveInfo({ groupId, btnId, mode: 'cheer' });
  playVideoById(btn, btn.label);
  renderAll();
}

function setActiveInfo(info) {
  activeInfo = info;
  renderActiveState();
}

function renderActiveState() {
  document.querySelectorAll('.pad-btn, .player-card').forEach(el => {
    const gid = el.dataset.gid, bid = el.dataset.bid;
    const isActive = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === bid;
    el.classList.toggle('playing', isActive && activeInfo.mode !== 'entrance');
    el.classList.toggle('entrance-playing', isActive && activeInfo.mode === 'entrance');
  });
  document.querySelectorAll('.player-action-btn').forEach(el => {
    const gid = el.dataset.gid, bid = el.dataset.bid, mode = el.dataset.mode;
    const isActive = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === bid && activeInfo.mode === mode;
    el.classList.toggle('entrance-active', mode === 'entrance' && isActive);
    el.classList.toggle('cheer-active', mode === 'cheer' && isActive);
  });
}

function updateNowPlaying(label) {
  const el = document.getElementById('now-playing');
  el.innerHTML = label ? `재생 중: <span>${label}</span>` : '재생 대기 중...';
}

// ══════════════════════════════════════════════════
// 데이터 헬퍼
// ══════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 10); }

function findGroup(gid) { return config.groups.find(g => g.id === gid); }

function findBtn(gid, bid) {
  const g = findGroup(gid);
  return g ? g.buttons.find(b => b.id === bid) : null;
}

function currentGroup() { return findGroup(currentGroupId); }

// ══════════════════════════════════════════════════
// 데이터 로드/저장
// ══════════════════════════════════════════════════
async function loadConfig() {
  try {
    const res = await fetch('./config.json?_=' + Date.now());
    if (res.ok) {
      const remote = await res.json();
      if (remote && Array.isArray(remote.groups)) {
        config = remote;
        initCurrentGroup();
        renderAll();
        return;
      }
      // 구버전 포맷 (buttons 배열)
      if (remote && Array.isArray(remote.buttons)) {
        config = migrateLegacy(remote);
        initCurrentGroup();
        renderAll();
        return;
      }
    }
  } catch (_) {}

  try {
    const s = localStorage.getItem('baseball-launchpad');
    if (s) {
      const parsed = JSON.parse(s);
      if (parsed.groups) config = parsed;
      else if (parsed.buttons) config = migrateLegacy(parsed);
    }
  } catch (_) {}

  if (!config.groups || !config.groups.length) {
    config = defaultConfig();
  }
  initCurrentGroup();
  renderAll();
}

function migrateLegacy(old) {
  return {
    groups: [{
      id: uid(), name: '기본 그룹', type: 'general',
      gridCols: old.gridCols || 4,
      buttons: (old.buttons || []).map(b => ({ ...b, id: b.id || uid() }))
    }]
  };
}

function defaultConfig() {
  return {
    groups: [
      {
        id: uid(), name: '팀 응원가', type: 'general', gridCols: 4,
        buttons: [
          { id: uid(), label: '응원 시작!', videoId: 'dQw4w9WgXcQ', startSeconds: 0, endSeconds: 30, color: '#e74c3c' }
        ]
      },
      {
        id: uid(), name: '선수', type: 'players', gridCols: 4,
        buttons: [
          { id: uid(), label: '이정후', battingOrder: 1, videoId: '', startSeconds: 0, endSeconds: 30, color: '#3498db' },
          { id: uid(), label: '김혜성', battingOrder: 2, videoId: '', startSeconds: 0, endSeconds: 30, color: '#2ecc71' },
        ]
      },
      {
        id: uid(), name: '상황별', type: 'general', gridCols: 4,
        buttons: []
      }
    ]
  };
}

function initCurrentGroup() {
  if (!config.groups.length) return;
  if (!currentGroupId || !findGroup(currentGroupId)) {
    currentGroupId = config.groups[0].id;
  }
}

function saveConfig() { localStorage.setItem('baseball-launchpad', JSON.stringify(config)); }

// ══════════════════════════════════════════════════
// 렌더링
// ══════════════════════════════════════════════════
function renderAll() {
  renderTabs();
  renderGrid();
}

function renderTabs() {
  const bar = document.getElementById('group-tabs');
  bar.innerHTML = '';

  config.groups.forEach(g => {
    const tab = document.createElement('button');
    tab.className = 'group-tab' + (g.id === currentGroupId ? ' active' : '');
    tab.dataset.gid = g.id;
    tab.innerHTML = `${escHtml(g.name)} <span class="tab-edit-icon" title="탭 편집">⋯</span>`;
    tab.onclick = e => {
      if (e.target.classList.contains('tab-edit-icon')) {
        showTabContextMenu(e, g.id);
      } else {
        currentGroupId = g.id;
        renderAll();
      }
    };
    tab.oncontextmenu = e => { e.preventDefault(); showTabContextMenu(e, g.id); };
    bar.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-group-btn';
  addBtn.textContent = '+ 그룹 추가';
  addBtn.onclick = addGroup;
  bar.appendChild(addBtn);
}

function renderGrid() {
  const g = currentGroup();
  const content = document.getElementById('launchpad-content');
  content.innerHTML = '';

  if (!g) {
    document.getElementById('current-group-name').textContent = '런치패드';
    document.getElementById('grid-cols').value = 4;
    return;
  }

  document.getElementById('current-group-name').textContent = g.name;
  const cols = g.gridCols || 4;
  document.getElementById('grid-cols').value = cols;

  if (g.type === 'players') {
    renderPlayerGroup(g, content, cols);
  } else {
    renderGeneralGroup(g, content, cols);
  }
}

function renderGeneralGroup(g, container, cols) {
  const grid = document.createElement('div');
  grid.className = 'launchpad-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  g.buttons.forEach(btn => grid.appendChild(makePad(btn, g.id)));

  const add = document.createElement('button');
  add.className = 'pad-btn empty';
  add.title = '새 버튼 추가';
  add.textContent = '+';
  add.onclick = () => addButtonToCurrentGroup();
  grid.appendChild(add);

  container.appendChild(grid);
}

function renderPlayerGroup(g, container, cols) {
  const starters = g.buttons.filter(b => b.battingOrder > 0).sort((a, b) => a.battingOrder - b.battingOrder);
  const bench    = g.buttons.filter(b => !b.battingOrder || b.battingOrder === 0);

  // 선발
  const divS = document.createElement('div');
  divS.className = 'section-divider';
  divS.textContent = `선발 (${starters.length}명)`;
  container.appendChild(divS);

  const gridS = document.createElement('div');
  gridS.className = 'launchpad-grid';
  gridS.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  starters.forEach(btn => gridS.appendChild(makePlayerCard(btn, g.id)));

  const addS = document.createElement('button');
  addS.className = 'pad-btn empty';
  addS.title = '선수 추가';
  addS.textContent = '+';
  addS.onclick = () => addButtonToCurrentGroup();
  gridS.appendChild(addS);
  container.appendChild(gridS);

  // 벤치
  const divB = document.createElement('div');
  divB.className = 'section-divider';
  divB.style.marginTop = '12px';
  divB.textContent = `벤치 (${bench.length}명)`;
  container.appendChild(divB);

  const gridB = document.createElement('div');
  gridB.className = 'launchpad-grid';
  gridB.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  bench.forEach(btn => gridB.appendChild(makePlayerCard(btn, g.id)));
  container.appendChild(gridB);
}

// ── 일반 패드 ──
function makePad(btn, gid) {
  const isPopup = btn.videoId && popupSet.has(btn.videoId);
  const isActive = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === btn.id;

  const el = document.createElement('button');
  el.className = 'pad-btn' + (isActive ? ' playing' : '') + (isPopup ? ' popup-mode' : '');
  el.style.background = btn.color || '#2c3e50';
  el.dataset.gid = gid;
  el.dataset.bid = btn.id;

  if (isPopup) {
    const b = document.createElement('div');
    b.className = 'pad-badge popup'; b.textContent = '팝업재생';
    el.appendChild(b);
  }

  const label = document.createElement('div');
  label.className = 'pad-label';
  label.textContent = btn.label || '(이름 없음)';

  const time = document.createElement('div');
  time.className = 'pad-time';
  if (btn.startSeconds != null && btn.endSeconds != null)
    time.textContent = `${fmt(btn.startSeconds)} – ${fmt(btn.endSeconds)}`;

  const edit = document.createElement('button');
  edit.className = 'pad-edit-btn';
  edit.title = '편집'; edit.textContent = '✏';
  edit.onclick = e => { e.stopPropagation(); openEditPanelByBtn(gid, btn.id); };

  el.append(label, time, edit);
  el.onclick = () => handlePadClick(gid, btn.id);
  return el;
}

// ── 선수 카드 ──
function makePlayerCard(btn, gid) {
  const hasEntrance = btn.entrance && btn.entrance.videoId;
  const isActive = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === btn.id;
  const isEntrance = isActive && activeInfo.mode === 'entrance';
  const isCheer    = isActive && activeInfo.mode === 'cheer';

  if (!hasEntrance) {
    // 등장곡 없으면 일반 패드처럼
    const pad = makePad(btn, gid);
    if (btn.battingOrder) {
      const order = document.createElement('div');
      order.className = 'pad-badge order';
      order.textContent = btn.battingOrder;
      pad.insertBefore(order, pad.firstChild);
    }
    return pad;
  }

  const card = document.createElement('div');
  card.className = 'player-card' + (isEntrance ? ' entrance-playing' : '') + (isCheer ? ' playing' : '');
  card.style.background = btn.color || '#2c3e50';
  card.dataset.gid = gid;
  card.dataset.bid = btn.id;

  const top = document.createElement('div');
  top.className = 'player-card-top';

  const orderEl = document.createElement('div');
  orderEl.className = 'player-order-num';
  orderEl.textContent = btn.battingOrder ? btn.battingOrder : '';

  const nameEl = document.createElement('div');
  nameEl.className = 'player-name';
  nameEl.textContent = btn.label || '(이름 없음)';

  top.append(orderEl, nameEl);

  const actions = document.createElement('div');
  actions.className = 'player-card-actions';

  const entranceBtn = document.createElement('button');
  entranceBtn.className = 'player-action-btn' + (isEntrance ? ' entrance-active' : '');
  entranceBtn.dataset.gid = gid; entranceBtn.dataset.bid = btn.id; entranceBtn.dataset.mode = 'entrance';
  entranceBtn.innerHTML = '<span>🎵</span><span>등장</span>';
  entranceBtn.onclick = e => { e.stopPropagation(); handleEntranceClick(gid, btn.id); };

  const cheerBtn = document.createElement('button');
  cheerBtn.className = 'player-action-btn' + (isCheer ? ' cheer-active' : '');
  cheerBtn.dataset.gid = gid; cheerBtn.dataset.bid = btn.id; cheerBtn.dataset.mode = 'cheer';
  cheerBtn.innerHTML = '<span>⚾</span><span>응원</span>';
  cheerBtn.onclick = e => { e.stopPropagation(); handleCheerClick(gid, btn.id); };

  actions.append(entranceBtn, cheerBtn);

  const edit = document.createElement('button');
  edit.className = 'pad-edit-btn';
  edit.title = '편집'; edit.textContent = '✏';
  edit.onclick = e => { e.stopPropagation(); openEditPanelByBtn(gid, btn.id); };

  card.append(top, actions, edit);
  return card;
}

function fmt(sec) {
  if (sec == null || isNaN(sec)) return '?';
  return `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, '0')}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════
// 탭 컨텍스트 메뉴
// ══════════════════════════════════════════════════
function showTabContextMenu(e, gid) {
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';

  const btnRename = document.createElement('button');
  btnRename.textContent = '✏ 이름 변경';
  btnRename.onclick = () => { hideCtxMenu(); renameGroup(gid); };

  const btnType = document.createElement('button');
  const g = findGroup(gid);
  btnType.textContent = g.type === 'players' ? '🔄 일반 그룹으로 변경' : '🔄 선수 그룹으로 변경';
  btnType.onclick = () => { hideCtxMenu(); toggleGroupType(gid); };

  const btnDel = document.createElement('button');
  btnDel.className = 'danger';
  btnDel.textContent = '🗑 그룹 삭제';
  btnDel.onclick = () => { hideCtxMenu(); deleteGroup(gid); };

  menu.append(btnRename, btnType, btnDel);

  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top  = e.clientY + 'px';

  // 화면 경계 처리
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  menu.style.left = (window.innerWidth  - r.width  - 4) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top  = (window.innerHeight - r.height - 4) + 'px';
  });
}

function hideCtxMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { hideCtxMenu(); ctrlStop(); } });

// ══════════════════════════════════════════════════
// 그룹 관리
// ══════════════════════════════════════════════════
function addGroup() {
  const name = prompt('그룹 이름을 입력하세요:', '새 그룹');
  if (!name) return;
  const g = { id: uid(), name: name.trim(), type: 'general', gridCols: 4, buttons: [] };
  config.groups.push(g);
  currentGroupId = g.id;
  saveConfig(); renderAll();
  showToast(`'${g.name}' 그룹이 추가되었습니다.`);
}

function renameGroup(gid) {
  const g = findGroup(gid);
  if (!g) return;
  const name = prompt('새 그룹 이름:', g.name);
  if (!name) return;
  g.name = name.trim();
  saveConfig(); renderAll();
}

function toggleGroupType(gid) {
  const g = findGroup(gid);
  if (!g) return;
  g.type = g.type === 'players' ? 'general' : 'players';
  saveConfig(); renderAll();
  showToast(`'${g.name}' 그룹 타입이 변경되었습니다.`);
}

function deleteGroup(gid) {
  if (config.groups.length <= 1) { showToast('마지막 그룹은 삭제할 수 없습니다.'); return; }
  const g = findGroup(gid);
  if (!confirm(`'${g.name}' 그룹과 모든 버튼을 삭제할까요?`)) return;
  config.groups = config.groups.filter(x => x.id !== gid);
  if (currentGroupId === gid) currentGroupId = config.groups[0].id;
  saveConfig(); renderAll();
  showToast('그룹이 삭제되었습니다.');
}

// ══════════════════════════════════════════════════
// 버튼 관리
// ══════════════════════════════════════════════════
function addButtonToCurrentGroup() {
  const g = currentGroup();
  if (!g) return;
  const isPlayers = g.type === 'players';
  const newBtn = {
    id: uid(),
    label: isPlayers ? '새 선수' : '새 버튼',
    videoId: '', startSeconds: 0, endSeconds: 60,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  };
  if (isPlayers) newBtn.battingOrder = 0;
  g.buttons.push(newBtn);
  saveConfig(); renderAll();
  openEditPanelByBtn(g.id, newBtn.id);
  showToast('새 버튼이 추가되었습니다.');
}

// ══════════════════════════════════════════════════
// 편집 패널
// ══════════════════════════════════════════════════
function openEditPanelByBtn(gid, bid) {
  const btn = findBtn(gid, bid);
  if (!btn) return;
  editingBtnId = bid;
  const g = findGroup(gid);

  document.getElementById('edit-placeholder').style.display = 'none';
  document.getElementById('edit-form').style.display = 'block';
  document.getElementById('edit-slot-label').textContent = btn.label || '(이름 없음)';
  document.getElementById('edit-label').value  = btn.label || '';
  document.getElementById('edit-url').value    = btn.videoId || '';
  document.getElementById('edit-start').value  = btn.startSeconds != null ? fmt(btn.startSeconds) : '';
  document.getElementById('edit-end').value    = btn.endSeconds   != null ? fmt(btn.endSeconds)   : '';

  // 그룹 드롭다운
  const sel = document.getElementById('edit-group');
  sel.innerHTML = '';
  config.groups.forEach(grp => {
    const opt = document.createElement('option');
    opt.value = grp.id; opt.textContent = grp.name;
    if (grp.id === gid) opt.selected = true;
    sel.appendChild(opt);
  });

  // 타순 + 등장곡 (선수 그룹)
  const isPlayers = g && g.type === 'players';
  document.getElementById('edit-batting-order-group').style.display = isPlayers ? '' : 'none';
  document.getElementById('entrance-section').style.display = isPlayers ? '' : 'none';
  document.getElementById('cheer-section-title').textContent = isPlayers ? '응원가' : '재생 정보';

  if (isPlayers) {
    document.getElementById('edit-batting-order').value = btn.battingOrder ?? 0;
    const hasEntrance = !!(btn.entrance && btn.entrance.videoId);
    document.getElementById('entrance-enabled').checked = hasEntrance;
    document.getElementById('entrance-fields').style.display = hasEntrance ? '' : 'none';
    if (hasEntrance) {
      document.getElementById('entrance-url').value   = btn.entrance.videoId || '';
      document.getElementById('entrance-start').value = btn.entrance.startSeconds != null ? fmt(btn.entrance.startSeconds) : '';
      document.getElementById('entrance-end').value   = btn.entrance.endSeconds   != null ? fmt(btn.entrance.endSeconds)   : '';
    } else {
      document.getElementById('entrance-url').value   = '';
      document.getElementById('entrance-start').value = '';
      document.getElementById('entrance-end').value   = '';
    }
  }

  renderSwatches(btn.color);
  switchTab('edit');
}

function toggleEntranceFields() {
  const enabled = document.getElementById('entrance-enabled').checked;
  document.getElementById('entrance-fields').style.display = enabled ? '' : 'none';
}

function renderSwatches(selected) {
  const c = document.getElementById('color-swatches');
  c.innerHTML = '';
  COLORS.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (col === selected ? ' selected' : '');
    sw.style.background = col;
    sw.onclick = () => {
      c.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    c.appendChild(sw);
  });
}

function saveEdit() {
  if (!editingBtnId) return;

  const targetGid = document.getElementById('edit-group').value;
  const label    = document.getElementById('edit-label').value.trim();
  const urlInput = document.getElementById('edit-url').value.trim();
  const startRaw = document.getElementById('edit-start').value.trim();
  const endRaw   = document.getElementById('edit-end').value.trim();
  const colorEl  = document.querySelector('.color-swatch.selected');

  if (!label)    { showToast('이름을 입력하세요.'); return; }

  const videoId = urlInput ? parseVideoId(urlInput) : '';
  if (urlInput && !videoId) { showToast('올바른 YouTube URL이 아닙니다.'); return; }

  const start = parseTime(startRaw);
  const end   = parseTime(endRaw);
  if (start == null) { showToast('시작 시간 형식 오류'); return; }
  if (end != null && end > 0 && end <= start) { showToast('종료 시간은 시작 시간보다 커야 합니다.'); return; }

  // 현재 그룹 찾기
  let srcGroup = null;
  let btn = null;
  for (const g of config.groups) {
    const b = g.buttons.find(b => b.id === editingBtnId);
    if (b) { srcGroup = g; btn = b; break; }
  }
  if (!btn) return;

  if (btn.videoId !== videoId) popupSet.delete(btn.videoId);

  btn.label        = label;
  btn.videoId      = videoId;
  btn.startSeconds = start;
  btn.endSeconds   = end;
  if (colorEl) btn.color = colorEl.style.background;

  // 타순
  const targetGroup = findGroup(targetGid);
  if (targetGroup && targetGroup.type === 'players') {
    btn.battingOrder = parseInt(document.getElementById('edit-batting-order').value) || 0;
    // 등장곡
    const entranceEnabled = document.getElementById('entrance-enabled').checked;
    if (entranceEnabled) {
      const eUrl   = document.getElementById('entrance-url').value.trim();
      const eStart = parseTime(document.getElementById('entrance-start').value.trim());
      const eEnd   = parseTime(document.getElementById('entrance-end').value.trim());
      const eVid   = eUrl ? parseVideoId(eUrl) : null;
      if (eVid) {
        btn.entrance = { videoId: eVid, startSeconds: eStart || 0, endSeconds: eEnd };
      } else {
        delete btn.entrance;
      }
    } else {
      delete btn.entrance;
    }
  } else {
    delete btn.battingOrder;
    delete btn.entrance;
  }

  // 그룹 이동
  if (srcGroup && srcGroup.id !== targetGid && targetGroup) {
    srcGroup.buttons = srcGroup.buttons.filter(b => b.id !== btn.id);
    targetGroup.buttons.push(btn);
    currentGroupId = targetGid;
  }

  saveConfig(); renderAll();
  document.getElementById('edit-slot-label').textContent = label;
  showToast('저장되었습니다!');
}

function deleteButton() {
  if (!editingBtnId) return;
  if (!confirm('이 버튼을 삭제할까요?')) return;
  for (const g of config.groups) {
    const idx = g.buttons.findIndex(b => b.id === editingBtnId);
    if (idx !== -1) { g.buttons.splice(idx, 1); break; }
  }
  if (activeInfo && activeInfo.btnId === editingBtnId) { ctrlStop(); }
  editingBtnId = null;
  saveConfig(); renderAll();
  document.getElementById('edit-placeholder').style.display = '';
  document.getElementById('edit-form').style.display = 'none';
  showToast('삭제되었습니다.');
}

// ══════════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════════
function parseVideoId(s) {
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  for (const re of [
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /[?&]v=([a-zA-Z0-9_-]{11})/,
    /embed\/([a-zA-Z0-9_-]{11})/,
    /shorts\/([a-zA-Z0-9_-]{11})/,
  ]) { const m = s.match(re); if (m) return m[1]; }
  return null;
}

function parseTime(raw) {
  if (!raw) return 0;
  raw = raw.trim();
  if (!raw) return 0;
  if (raw.includes(':')) {
    const p = raw.split(':').map(Number);
    if (p.some(isNaN)) return null;
    if (p.length === 2) return p[0] * 60 + p[1];
    if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
    return null;
  }
  const n = parseFloat(raw);
  return isNaN(n) ? null : n;
}

function setGridCols(v) {
  const g = currentGroup();
  if (g) { g.gridCols = parseInt(v); saveConfig(); renderAll(); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['edit','io'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ══════════════════════════════════════════════════
// 내보내기 / 가져오기
// ══════════════════════════════════════════════════
function exportConfig() {
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: 'baseball-launchpad.json'
  });
  a.click();
  showToast('설정 파일이 다운로드되었습니다.');
}

function exportToTextarea() {
  document.getElementById('export-area').value = JSON.stringify(config, null, 2);
  showToast('JSON이 생성되었습니다.');
}

function copyExport() {
  const t = document.getElementById('export-area').value;
  if (!t) { showToast('먼저 "JSON 생성"을 누르세요.'); return; }
  navigator.clipboard.writeText(t).then(() => showToast('클립보드에 복사됐습니다!'));
}

function applyImport() {
  const t = document.getElementById('import-area').value.trim();
  if (!t) { showToast('JSON을 붙여넣어 주세요.'); return; }
  try {
    const d = JSON.parse(t);
    if (d.groups) { config = d; }
    else if (d.buttons) { config = migrateLegacy(d); }
    else throw 0;
    initCurrentGroup();
    saveConfig(); renderAll();
    const total = config.groups.reduce((n, g) => n + g.buttons.length, 0);
    showToast(`${total}개 버튼을 가져왔습니다!`);
    switchTab('edit');
  } catch { showToast('올바른 JSON 형식이 아닙니다.'); }
}

function triggerImport() { document.getElementById('import-file').click(); }

function importFromFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.groups) { config = d; }
      else if (d.buttons) { config = migrateLegacy(d); }
      else throw 0;
      initCurrentGroup();
      saveConfig(); renderAll();
      const total = config.groups.reduce((n, g) => n + g.buttons.length, 0);
      showToast(`${total}개 버튼을 가져왔습니다!`);
    } catch { showToast('파일 읽기 실패: 올바른 JSON이 아닙니다.'); }
    e.target.value = '';
  };
  r.readAsText(file);
}

function resetConfig() {
  if (!confirm('모든 설정을 초기화할까요?')) return;
  config = defaultConfig();
  initCurrentGroup();
  editingBtnId = null;
  saveConfig(); renderAll();
  document.getElementById('edit-placeholder').style.display = '';
  document.getElementById('edit-form').style.display = 'none';
  showToast('초기화되었습니다.');
}

// ══════════════════════════════════════════════════
// 토스트
// ══════════════════════════════════════════════════
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════
// 시작
// ══════════════════════════════════════════════════
renderSwatches(COLORS[0]);
loadConfig();
</script>
