<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야구 응원가 런치패드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #dde3f0; color: #eee;
  font-family: 'Segoe UI', sans-serif;
  display: flex; flex-direction: column; min-height: 100vh; user-select: none;
}
header {
  background: #16213e; padding: 12px 20px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 2px solid #0f3460; flex-wrap: wrap;
}
header h1 { font-size: 1.2rem; color: #e94560; white-space: nowrap; }
.header-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn-small {
  background: #0f3460; color: #eee; border: 1px solid #1a5276;
  border-radius: 6px; padding: 6px 12px; cursor: pointer;
  font-size: 0.8rem; transition: background 0.2s; white-space: nowrap;
}
.btn-small:hover { background: #1a5276; }
.main { display: flex; flex: 1; overflow: hidden; }

/* 왼쪽 패널 */
.left-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
#player-wrap { background: #000; overflow: hidden; display: none; flex-shrink: 0; }
#player-wrap.visible { display: block; }
#player-wrap iframe { display: block; width: 100%; aspect-ratio: 16/9; border: none; }

/* 컨트롤 바 */
.control-bar {
  background: #16213e; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  flex-shrink: 0; border-bottom: 1px solid #0f3460;
}
.now-playing {
  flex: 1; font-size: 0.85rem; color: #aaa;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 100px;
}
.now-playing span { color: #e94560; font-weight: bold; }
.ctrl-btn {
  background: #0f3460; color: #eee; border: none; border-radius: 8px;
  padding: 8px 14px; cursor: pointer; font-size: 1rem; transition: background 0.2s, transform 0.1s;
}
.ctrl-btn:hover { background: #1a5276; }
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn.stop { background: #7b241c; }
.ctrl-btn.stop:hover { background: #a93226; }
.volume-group { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #aaa; }
input[type=range] { width: 80px; accent-color: #e94560; }
.toggle-btn {
  background: #0f3460; color: #aaa; border: 1px solid #1a5276;
  border-radius: 6px; padding: 6px 10px; cursor: pointer;
  font-size: 0.8rem; transition: background 0.2s, color 0.2s; white-space: nowrap;
}
.toggle-btn:hover, .toggle-btn.on { background: #1a5276; color: #fff; }

/* 그룹 탭 바 */
.group-tabs {
  display: flex; align-items: center;
  background: #16213e; border-bottom: 2px solid #0f3460;
  padding: 0 12px; overflow-x: auto; flex-shrink: 0;
}
.group-tab {
  background: none; border: none; color: #aaa;
  padding: 10px 14px; cursor: pointer; font-size: 0.85rem;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: color 0.2s;
}
.group-tab:hover { color: #eee; }
.group-tab.active { color: #e94560; border-bottom-color: #e94560; }
.group-tab .tab-edit-icon { display: none; margin-left: 6px; opacity: 0.5; font-size: 0.7rem; }
.group-tab:hover .tab-edit-icon { display: inline; }
.add-group-btn {
  background: none; border: none; color: #555; padding: 10px 12px;
  cursor: pointer; font-size: 0.85rem; white-space: nowrap; transition: color 0.2s;
}
.add-group-btn:hover { color: #e94560; }

/* 런치패드 영역 */
.launchpad-area { padding: 16px; flex: 1; }
.launchpad-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px;
}
.launchpad-header h2 { font-size: 0.9rem; color: #3a4a6b; flex-shrink: 0; font-weight: bold; }
.launchpad-header-right { display: flex; align-items: center; gap: 8px; }
.grid-controls { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #4a5a7a; }
.grid-controls select {
  background: #fff; color: #2c3a5c; border: 1px solid #a0b0cc;
  border-radius: 4px; padding: 3px 6px;
}
.select-info { font-size: 0.8rem; color: #c0392b; font-weight: bold; }

/* 전체 보기 그룹 헤더 */
.group-section-header {
  font-size: 0.85rem; color: #c0392b; font-weight: bold;
  padding: 4px 0 8px; display: flex; align-items: center; gap: 8px; margin-top: 20px;
}
.group-section-header:first-child { margin-top: 0; }
.group-section-header::after { content: ''; flex: 1; height: 1px; background: #a0b0cc; }

/* 섹션 구분자 */
.section-divider {
  font-size: 0.75rem; color: #6a7a9a; font-weight: bold;
  padding: 6px 0 8px; display: flex; align-items: center; gap: 8px;
}
.section-divider::after { content: ''; flex: 1; height: 1px; background: #b0bdd8; }

.launchpad-grid { display: grid; gap: 8px; margin-bottom: 16px; }

/* 일반 패드 — jersey card style */
.pad-btn {
  position: relative; aspect-ratio: 1; border: none;
  border-radius: 12px; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start; padding: 14px 8px 8px; text-align: center;
  transition: filter 0.12s, transform 0.12s, box-shadow 0.2s;
  font-size: 0.85rem; font-weight: 800; word-break: keep-all; overflow: hidden;
  background: linear-gradient(175deg, #142245 0%, #0d1b36 100%); color: #fff;
  text-shadow: 0 1px 5px rgba(0,0,0,0.9);
  box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
}
/* white piping — outer V, wider at center (like real jersey piping) */
.pad-btn::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: #fff;
  clip-path: polygon(0% 100%, 0% 46%, 50% 60%, 100% 46%, 100% 100%);
}
/* accent V — inner V, gap grows toward center */
.pad-btn::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: var(--accent, #e74c3c);
  clip-path: polygon(0% 100%, 0% 51%, 50% 72%, 100% 51%, 100% 100%);
}
.pad-btn > * { position: relative; z-index: 2; }
.pad-btn:hover { filter: brightness(1.22); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.55); }
.pad-btn:active { transform: scale(0.93) translateY(0); filter: brightness(0.95); }
.pad-btn.playing {
  box-shadow: 0 0 0 2px #fff, 0 0 20px var(--accent, #e94560);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(255,255,255,0.75), 0 0 12px var(--accent, #e94560); }
  50%       { box-shadow: 0 0 0 2px #fff, 0 0 28px var(--accent, #e94560); }
}
.pad-btn.popup-mode { opacity: 0.78; }
.pad-btn.empty {
  border: 2px dashed rgba(255,255,255,0.12); opacity: 0.32; font-size: 1.6rem; color: rgba(255,255,255,0.3);
}
.pad-btn.empty::before { display: none; }
.pad-btn.empty:hover { opacity: 0.58; }

/* 선택 모드 */
.pad-btn.selected, .player-card.selected {
  outline: 3px solid #e94560; outline-offset: -1px;
}
.select-check {
  position: absolute; bottom: 4px; right: 6px; z-index: 4;
  font-size: 0.9rem; color: #e94560; font-weight: bold; pointer-events: none;
}

.pad-label { font-size: 0.82rem; font-weight: 800; line-height: 1.2; pointer-events: none; letter-spacing: -0.2px; }
.pad-time  { font-size: 0.62rem; opacity: 0.6; margin-top: 4px; pointer-events: none; }
.pad-badge {
  position: absolute; top: 5px; left: 6px; z-index: 2;
  border-radius: 3px; padding: 1px 5px;
  font-size: 0.58rem; font-weight: bold; pointer-events: none; line-height: 1.6;
}
.pad-badge.popup { background: rgba(200,100,0,0.9); color: #fff; }
.pad-badge.order { background: none; color: rgba(255,255,255,0.55); font-size: 0.68rem; font-weight: 900; padding: 0; }
.pad-edit-btn {
  position: absolute; top: 4px; right: 4px; z-index: 2;
  background: rgba(0,0,0,0.55); border: none; color: rgba(255,255,255,0.5); border-radius: 4px;
  width: 18px; height: 18px; font-size: 0.6rem; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.pad-btn:hover .pad-edit-btn, .player-card:hover .pad-edit-btn { display: flex; }
.pad-edit-btn:hover { color: #fff; background: rgba(0,0,0,0.8); }

/* 선수 카드 — pad-btn과 동일한 외관 */
.player-card {
  position: relative; border: none;
  border-radius: 12px; overflow: hidden; cursor: pointer;
  transition: filter 0.12s, transform 0.12s, box-shadow 0.2s;
  display: flex; flex-direction: column; aspect-ratio: 1;
  background: linear-gradient(175deg, #142245 0%, #0d1b36 100%);
  box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
}
/* white piping — pad-btn과 동일 */
.player-card::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: #fff;
  clip-path: polygon(0% 100%, 0% 46%, 50% 60%, 100% 46%, 100% 100%);
}
/* accent V — pad-btn과 동일 */
.player-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: var(--accent, #e74c3c);
  clip-path: polygon(0% 100%, 0% 51%, 50% 72%, 100% 51%, 100% 100%);
}
.player-card:hover { filter: brightness(1.22); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.55); }
.player-card:active { transform: scale(0.93) translateY(0); filter: brightness(0.95); }
.player-card.playing {
  box-shadow: 0 0 0 2px #fff, 0 0 20px var(--accent, #e94560);
  animation: pulse 1.2s ease-in-out infinite;
}
.player-card.entrance-playing {
  box-shadow: 0 0 0 2px #f39c12, 0 0 20px rgba(243,156,18,0.7);
  animation: pulseOrange 1.2s ease-in-out infinite;
}
@keyframes pulseOrange {
  0%, 100% { box-shadow: 0 0 0 2px rgba(243,156,18,0.75), 0 0 12px rgba(243,156,18,0.5); }
  50%       { box-shadow: 0 0 0 2px #f39c12, 0 0 26px rgba(243,156,18,0.9); }
}
.player-card-top {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 14px 8px 8px; text-align: center; cursor: pointer;
  position: relative; z-index: 2;
}
.player-num-row {
  display: flex; align-items: baseline; gap: 4px;
  position: relative; z-index: 2;
}
.batting-order-top {
  position: absolute; top: 5px; left: 7px; z-index: 3;
  font-size: 0.6rem; color: rgba(255,255,255,0.6); font-weight: 700;
  pointer-events: none;
}
/* jersey number — white with accent outline */
.player-order-num {
  font-size: 1.6rem; font-weight: 900; color: #fff; line-height: 1;
  letter-spacing: -2px; position: relative; z-index: 2;
  text-shadow:
    -1px -1px 0 var(--accent, #e74c3c),  1px -1px 0 var(--accent, #e74c3c),
    -1px  1px 0 var(--accent, #e74c3c),   1px  1px 0 var(--accent, #e74c3c),
    0 3px 8px rgba(0,0,0,0.8);
}
.player-name {
  font-size: 0.88rem; font-weight: 800; line-height: 1.1; margin-top: 2px;
  position: relative; z-index: 2; letter-spacing: 1.5px;
  text-shadow: 0 1px 5px rgba(0,0,0,0.9);
}
.player-chain-hint { display: none; }
/* 등장/응원 버튼 — 하단 오버레이 (항상 표시) */
.player-card-actions {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  display: flex;
  background: rgba(0,0,0,0.55); border-top: 1px solid rgba(255,255,255,0.1);
}
.player-action-btn {
  flex: 1; background: transparent; border: none; color: #ddd;
  padding: 7px 4px; cursor: pointer; font-size: 0.68rem;
  transition: background 0.15s; display: flex;
  flex-direction: column; align-items: center; gap: 2px; line-height: 1;
}
.player-action-btn:hover { background: rgba(255,255,255,0.12); }
.player-action-btn:active { background: rgba(255,255,255,0.22); }
.player-action-btn + .player-action-btn { border-left: 1px solid rgba(255,255,255,0.08); }
.player-action-btn.entrance-active { background: rgba(243,156,18,0.35); }
.player-action-btn.cheer-active    { background: rgba(46,204,113,0.28); }

/* 컨텍스트 메뉴 */
.ctx-menu {
  position: fixed; background: #1e2d4a; border: 1px solid #0f3460;
  border-radius: 8px; padding: 6px 0; z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); min-width: 160px;
}
.ctx-menu button {
  display: block; width: 100%; background: none; border: none;
  color: #eee; padding: 8px 16px; cursor: pointer; text-align: left;
  font-size: 0.82rem; transition: background 0.15s;
}
.ctx-menu button:hover { background: #0f3460; }
.ctx-menu button.danger { color: #e74c3c; }

/* 오른쪽 패널 */
.right-panel {
  width: 300px; background: #16213e; position: relative;
  border-left: 2px solid #0f3460; display: flex; flex-direction: row; overflow: hidden;
  transition: width 0.2s ease; flex-shrink: 0;
}
.right-panel.collapsed { width: 32px; min-width: 32px; }
.right-panel.collapsed .right-panel-inner { display: none; }
.panel-toggle {
  width: 32px; min-width: 32px; background: #0f3460; border: none; color: #aaa; cursor: pointer;
  font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
  border-right: 1px solid #1a5276; flex-shrink: 0;
}
.panel-toggle:hover { color: #eee; background: #1a5276; }
.right-panel-inner { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 0; }
.panel-tab { display: flex; border-bottom: 2px solid #0f3460; overflow-x: auto; }
.tab-btn {
  flex: 1; background: none; border: none; color: #aaa; padding: 10px 8px;
  cursor: pointer; font-size: 0.75rem; white-space: nowrap;
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s;
}
.tab-btn.active { color: #e94560; border-bottom-color: #e94560; }
.tab-btn:hover { color: #eee; }
.panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; background: #0f3460; color: #eee;
  border: 1px solid #1a5276; border-radius: 6px; padding: 7px 10px; font-size: 0.82rem; outline: none;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #e94560; }
.color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.color-swatch {
  width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #fff; }
.section-title {
  font-size: 0.78rem; color: #e94560; font-weight: bold;
  margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid #0f3460;
}
.slot-info { background: #0f3460; border-radius: 6px; padding: 8px 10px; font-size: 0.8rem; color: #aaa; margin-bottom: 12px; }
.slot-info strong { color: #eee; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-primary {
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  padding: 10px; width: 100%; cursor: pointer; font-size: 0.88rem;
  font-weight: bold; transition: background 0.2s; margin-top: 4px;
}
.btn-primary:hover { background: #c0392b; }
.btn-danger {
  background: #5d2525; color: #eee; border: none; border-radius: 8px;
  padding: 8px; width: 100%; cursor: pointer; font-size: 0.82rem;
  transition: background 0.2s; margin-top: 6px;
}
.btn-danger:hover { background: #922b21; }
.entrance-section { border: 1px solid #1a5276; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
.entrance-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #aaa; cursor: pointer; }
.entrance-toggle input[type=checkbox] { accent-color: #e94560; }
.entrance-fields { margin-top: 10px; }
.import-export-area textarea {
  width: 100%; height: 120px; background: #0a1628; color: #7fdbff;
  border: 1px solid #1a5276; border-radius: 6px; padding: 8px;
  font-size: 0.72rem; font-family: monospace; resize: vertical;
}
.parser-hint {
  font-size: 0.73rem; color: #666; line-height: 1.55; margin-bottom: 10px;
  background: #0f1f38; border-radius: 6px; padding: 8px 10px;
}
.parser-hint code { color: #7fdbff; font-family: monospace; }

#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #333; color: #fff; padding: 10px 20px;
  border-radius: 8px; font-size: 0.85rem; opacity: 0;
  transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.err  { background: #922b21; }

@media (max-width: 768px) {
  .main { flex-direction: column; }
  .right-panel { width: 100%; border-left: none; border-top: 2px solid #0f3460; max-height: 380px; }
}
</style>
</head>
<body>

<header>
  <h1>⚾ 야구 응원가 런치패드</h1>
  <div class="header-controls">
    <button class="btn-small" onclick="addButtonToCurrentGroup()">+ 버튼 추가</button>
    <button class="btn-small" onclick="exportConfig()">내보내기</button>
    <button class="btn-small" onclick="triggerImport()">가져오기</button>
    <button class="btn-small" onclick="loadPreset('kia2025')" title="KIA 타이거즈 2025 기본 세팅 불러오기">📋 기아2025</button>
    <button class="btn-small" onclick="resetConfig()" style="color:#e74c3c">초기화</button>
    <a href="./manual.html" target="_blank" class="btn-small" style="text-decoration:none">📖 사용법</a>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importFromFile(event)">
  </div>
</header>

<div class="main">
  <div class="left-panel">
    <div id="player-wrap"><div id="player-container"></div></div>

    <div class="control-bar">
      <div class="now-playing" id="now-playing">재생 대기 중...</div>
      <button class="ctrl-btn" onclick="ctrlPause()">⏸</button>
      <button class="ctrl-btn stop" onclick="ctrlStop()">⏹</button>
      <div class="volume-group">🔊<input type="range" id="volume-slider" min="0" max="100" value="80" oninput="ctrlVolume(this.value)"></div>
      <button class="toggle-btn" id="player-toggle" onclick="togglePlayer()">📺 영상 보기</button>
    </div>

    <div class="group-tabs" id="group-tabs"></div>

    <div class="launchpad-area">
      <div class="launchpad-header">
        <h2 id="current-group-name">런치패드</h2>
        <div class="launchpad-header-right">
          <!-- 일반 모드 컨트롤 -->
          <div id="normal-controls" style="display:flex;align-items:center;gap:8px">
            <div class="grid-controls" id="grid-controls">
              열: <select id="grid-cols" onchange="setGridCols(this.value)">
                <option value="3">3</option><option value="4">4</option>
                <option value="5" selected>5</option><option value="6">6</option>
              </select>
            </div>
            <button class="btn-small" onclick="enterSelectMode()" title="여러 버튼 선택 후 삭제">☑ 선택</button>
          </div>
          <!-- 선택 모드 컨트롤 -->
          <div id="select-controls" style="display:none;align-items:center;gap:8px">
            <span class="select-info" id="select-count">0개 선택</span>
            <button class="btn-small" style="color:#e74c3c;border-color:#922b21" onclick="deleteSelected()">🗑 삭제</button>
            <button class="btn-small" onclick="exitSelectMode()">취소</button>
          </div>
        </div>
      </div>
      <div id="launchpad-content"></div>
    </div>
  </div>

  <!-- 오른쪽 편집 패널 -->
  <div class="right-panel collapsed" id="right-panel">
    <button class="panel-toggle" id="panel-toggle" onclick="toggleRightPanel()" title="패널 열기 (편집 모드)">▶</button>
    <div class="right-panel-inner" id="right-panel-inner">
    <div class="panel-tab">
      <button class="tab-btn active" data-tab="edit"   onclick="switchTab('edit')">버튼 편집</button>
      <button class="tab-btn"        data-tab="parser" onclick="switchTab('parser')">⚡ 파서</button>
      <button class="tab-btn"        data-tab="io"     onclick="switchTab('io')">가져오기/내보내기</button>
    </div>
    <div class="panel-body">

      <div class="tab-content active" id="tab-edit">

            <div class="form-group"><label>시작 (mm:ss)</label><input type="text" id="edit-start" placeholder="0:30"></div>
            <div class="form-group"><label>종료 (mm:ss)</label><input type="text" id="edit-end" placeholder="1:00"></div>

            </div>
            <!-- 구간 나누기 도구 -->
            <div id="cut-tool" style="display:none;background:#0a1628;border-radius:6px;padding:8px;margin-bottom:8px">
              <div style="font-size:0.72rem;color:#888;margin-bottom:6px">나누기 시점 입력 → 앞=등장곡 / 뒤=응원가</div>
              <div style="display:flex;gap:6px;align-items:center">
                <input type="text" id="cut-time" placeholder="0:20" style="flex:1;background:#0f3460;color:#eee;border:1px solid #1a5276;border-radius:6px;padding:5px 8px;font-size:0.82rem;outline:none">
                <button class="btn-small" style="background:#e94560;border-color:#e94560;color:#fff" onclick="applyCut()">적용</button>
                <button class="btn-small" onclick="document.getElementById('cut-tool').style.display='none'">✕</button>
              </div>
            </div>
            <div class="entrance-fields" id="entrance-fields" style="display:none">
              <div class="form-group" style="margin-top:4px">
                <label>등장곡 YouTube URL <span style="color:#555;font-size:0.7rem">(비워두면 응원가와 동일 영상)</span></label>
                <input type="text" id="entrance-url" placeholder="비워두면 응원가 URL 사용">
              </div>
              <div class="two-col">
                <div class="form-group"><label>시작</label><input type="text" id="entrance-start" placeholder="0:00"></div>
                <div class="form-group"><label>종료</label><input type="text" id="entrance-end" placeholder="0:30"></div>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>색상</label>

          유튜브 댓글 타임스탬프를 붙여넣으면 버튼을 자동 생성합니다.<br><br>
          지원 형식:<br>
          <code>0:30 이름</code><br>
          <code>0:30 - 1:10 이름</code><br>
          <code>0:30~1:10 이름</code>
        </div>
        <div class="form-group">
          <label>YouTube URL (선택 — 일괄 적용)</label>
          <input type="text" id="parser-url" placeholder="https://youtu.be/xxxxx">
        </div>

          <label>대상 그룹</label>
          <select id="parser-group"></select>
        </div>

          <label>타임스탬프 텍스트</label>
          <textarea id="parser-text" style="height:160px;font-family:monospace;font-size:0.75rem;color:#7fdbff;background:#0a1628;resize:vertical"
            placeholder="0:00 김도영&#10;0:45 박찬호&#10;1:20 나성범&#10;..."></textarea>
        </div>
        <button class="btn-primary" onclick="runParser()">버튼 생성</button>

      <div class="tab-content" id="tab-io">

        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="exportToTextarea()">JSON 생성</button>
        <button class="btn-small" style="width:100%;margin-top:6px;padding:8px" onclick="copyExport()">클립보드 복사</button>
        <div class="section-title" style="margin-top:20px">JSON 가져오기</div>
        <div class="import-export-area">
          <textarea id="import-area" placeholder="JSON을 붙여넣고 적용 버튼을 누르세요"></textarea>
        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="applyImport()">적용</button>

</div>

<div class="ctx-menu" id="ctx-menu" style="display:none"></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════
const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71',
  '#1abc9c','#3498db','#9b59b6','#e91e63',
  '#ff5722','#00bcd4','#8bc34a','#607d8b',
];
const ALL_TAB = '__all__';
const DEFAULT_VIDEO = 'Ruk1rklBDX4';

// ══════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════
let config         = { groups: [] };
let currentGroupId = null;
let editingBtnId   = null;
let activeInfo     = null;
let pendingCheer   = null;
const popupSet     = new Set();

// 선택 삭제 모드
let selectMode  = false;
const selectedIds = new Set();

let ytFrame    = null;
let frameReady = false;
let popupWin   = null;
let popupTimer = null;
let popupChainFn = null;

// ══════════════════════════════════════════════════
// YouTube IFrame API
// ══════════════════════════════════════════════════
window.onYouTubeIframeAPIReady = function () {
  ytFrame = new YT.Player('player-container', {
    width: '100%', height: '100%',
    host: 'https://www.youtube.com',  // youtube.com → 같은 브라우저 로그인 세션 공유 (광고 감소)
    playerVars: { autoplay: 0, rel: 0, modestbranding: 1, controls: 1 },
    events: {
      onReady(e) {
        frameReady = true;
        ctrlVolume(document.getElementById('volume-slider').value);
      },
      onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED) {
          if (pendingCheer) {
            const cheer = pendingCheer; pendingCheer = null;
            if (activeInfo) activeInfo.mode = 'cheer';
            renderActiveState();
            playVideoById(cheer, cheer.label);
          } else {
            setActiveInfo(null); updateNowPlaying(null);
          }
        }
      },
      onError(e) {
        const EMBED_BLOCKED = [101, 150];
        if (activeInfo) {
          const btn = findBtn(activeInfo.groupId, activeInfo.btnId);
          if (btn && EMBED_BLOCKED.includes(e.data)) {
            const vid = activeInfo.mode === 'entrance' ? (btn.entrance && btn.entrance.videoId) : btn.videoId;
            if (vid) popupSet.add(vid);
            renderAll();
            const src = activeInfo.mode === 'entrance' ? btn.entrance : btn;
            openPopup(src, pendingCheer ? () => {
              const cheer = pendingCheer; pendingCheer = null;
              openPopup(cheer, null);
              updateNowPlaying(cheer.label + ' (팝업)');
            } : null);
            showToast('삽입 불가 영상 → YouTube 팝업으로 재생합니다');
          } else {
            showToast(`재생 오류 (코드: ${e.data})`, true);
          }
        }
        pendingCheer = null; setActiveInfo(null); updateNowPlaying(null);
      },
    },
  });
};
(function () {
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════════════
// 팝업 폴백
// ══════════════════════════════════════════════════
function openPopup(btnData, chainCb) {
  clearTimeout(popupTimer);
  popupChainFn = chainCb || null;
  try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}
  const start = Math.floor(btnData.startSeconds || 0);
  popupWin = window.open(
    `https://www.youtube.com/watch?v=${btnData.videoId}&t=${start}s`,
    'yt-popup', 'width=900,height=540,toolbar=0,menubar=0,location=1,resizable=1'
  );
  const dur = (btnData.endSeconds || 0) - start;
  if (dur > 0) {
    popupTimer = setTimeout(() => {
      try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}
      if (popupChainFn) { popupChainFn(); popupChainFn = null; }
      else { setActiveInfo(null); updateNowPlaying(null); }
    }, dur * 1000);
  }
}

// ══════════════════════════════════════════════════
// 컨트롤
// ══════════════════════════════════════════════════
function ctrlPause() { if (frameReady) ytFrame.pauseVideo(); }
function ctrlStop() {
  pendingCheer = null; popupChainFn = null;
  if (frameReady) ytFrame.stopVideo();
  clearTimeout(popupTimer);
  try { if (popupWin && !popupWin.closed) popupWin.close(); } catch (_) {}
  setActiveInfo(null); updateNowPlaying(null);
}
function ctrlVolume(v) { if (frameReady) ytFrame.setVolume(parseInt(v)); }
function toggleRightPanel() {
  const panel = document.getElementById('right-panel');
  const btn   = document.getElementById('panel-toggle');
  const collapsed = panel.classList.toggle('collapsed');
  btn.textContent = collapsed ? '▶' : '◀';
  btn.title = collapsed ? '패널 열기 (편집 모드)' : '패널 닫기 (재생 모드로)';
}

function togglePlayer() {
  const wrap = document.getElementById('player-wrap');
  const btn  = document.getElementById('player-toggle');
  const on   = wrap.classList.toggle('visible');
  btn.textContent = on ? '📺 영상 숨기기' : '📺 영상 보기';
  btn.classList.toggle('on', on);
}

// ══════════════════════════════════════════════════
// 선택 삭제 모드
// ══════════════════════════════════════════════════
function enterSelectMode() {
  selectMode = true;
  selectedIds.clear();
  document.getElementById('normal-controls').style.display = 'none';
  document.getElementById('select-controls').style.display = 'flex';
  updateSelectCount();
  renderGrid();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.getElementById('normal-controls').style.display = 'flex';
  document.getElementById('select-controls').style.display = 'none';
  renderGrid();
}

function toggleSelect(bid) {
  if (selectedIds.has(bid)) selectedIds.delete(bid);
  else selectedIds.add(bid);
  updateSelectCount();
  const sel = selectedIds.has(bid);
  document.querySelectorAll(`[data-bid="${bid}"]`).forEach(el => {
    el.classList.toggle('selected', sel);
    const existing = el.querySelector('.select-check');
    if (sel && !existing) {
      const chk = document.createElement('div');
      chk.className = 'select-check'; chk.textContent = '✓';
      el.appendChild(chk);
    } else if (!sel && existing) {
      existing.remove();
    }
  });
}

function updateSelectCount() {
  document.getElementById('select-count').textContent = `${selectedIds.size}개 선택`;
}

function deleteSelected() {
  if (!selectedIds.size) { showToast('삭제할 버튼을 선택하세요.'); return; }
  if (!confirm(`선택한 ${selectedIds.size}개 버튼을 삭제할까요?`)) return;
  for (const g of config.groups) {
    g.buttons = g.buttons.filter(b => !selectedIds.has(b.id));
  }
  // 편집 중인 버튼이 포함돼 있으면 패널 초기화
  if (editingBtnId && selectedIds.has(editingBtnId)) {
    editingBtnId = null;
    document.getElementById('edit-placeholder').style.display = '';
    document.getElementById('edit-form').style.display = 'none';
  }
  if (activeInfo && selectedIds.has(activeInfo.btnId)) ctrlStop();
  showToast(`${selectedIds.size}개 버튼이 삭제되었습니다.`);
  exitSelectMode();
  saveConfig(); renderAll();
}

// ══════════════════════════════════════════════════
// 재생
// ══════════════════════════════════════════════════
function playVideoById(btnData, label) {
  if (popupSet.has(btnData.videoId)) {
    openPopup(btnData, null); updateNowPlaying(label + ' (팝업)'); return;
  }
  if (!frameReady) { showToast('플레이어 준비 중입니다. 잠시 후 다시 눌러주세요.'); return; }
  ytFrame.loadVideoById({
    videoId: btnData.videoId,
    startSeconds: btnData.startSeconds || 0,
    endSeconds:   btnData.endSeconds   || undefined,
  });
  updateNowPlaying(label);
}

function isEditMode() {
  return !document.getElementById('right-panel').classList.contains('collapsed');
}

function handlePadClick(groupId, btnId) {
  if (selectMode) { toggleSelect(btnId); return; }
  const btn = findBtn(groupId, btnId); if (!btn) return;
  if (isEditMode()) { openEditPanelByBtn(groupId, btnId); return; }
  pendingCheer = null;
  if (!btn.videoId) { showToast('먼저 YouTube URL을 설정하세요.'); return; }
  setActiveInfo({ groupId, btnId, mode: 'cheer' });
  playVideoById(btn, btn.label);
}

// 카드 이름 클릭 → 등장→응원 체인 (또는 병합)
function handleChainClick(groupId, btnId) {
  if (selectMode) { toggleSelect(btnId); return; }
  const btn = findBtn(groupId, btnId); if (!btn) return;
  if (isEditMode()) { openEditPanelByBtn(groupId, btnId); return; }

  if (!btn.entrance || !btn.entrance.videoId) {
    if (!btn.videoId) { showToast('먼저 YouTube URL을 설정하세요.'); return; }
    pendingCheer = null;
    setActiveInfo({ groupId, btnId, mode: 'cheer' });
    playVideoById(btn, btn.label);
    return;
  }

  // 병합 조건: 같은 영상 + 구간 간격 1초 이하
  const gapOk = btn.entrance.videoId === btn.videoId &&
    Math.abs((btn.entrance.endSeconds || 0) - (btn.startSeconds || 0)) <= 1;

  if (gapOk) {
    pendingCheer = null;
    setActiveInfo({ groupId, btnId, mode: 'cheer' });
    playVideoById({ videoId: btn.videoId, startSeconds: btn.entrance.startSeconds, endSeconds: btn.endSeconds }, btn.label);
  } else {
    pendingCheer = { videoId: btn.videoId, startSeconds: btn.startSeconds, endSeconds: btn.endSeconds, label: btn.label };
    setActiveInfo({ groupId, btnId, mode: 'entrance' });
    playVideoById(btn.entrance, btn.label + ' (등장)');
  }
}

function handleEntranceClick(groupId, btnId) {
  if (selectMode) { toggleSelect(btnId); return; }
  const btn = findBtn(groupId, btnId);
  if (isEditMode()) { openEditPanelByBtn(groupId, btnId); return; }
  if (!btn || !btn.entrance || !btn.entrance.videoId) { handleChainClick(groupId, btnId); return; }
  pendingCheer = { videoId: btn.videoId, startSeconds: btn.startSeconds, endSeconds: btn.endSeconds, label: btn.label };
  setActiveInfo({ groupId, btnId, mode: 'entrance' });
  playVideoById(btn.entrance, btn.label + ' (등장)');
}

function handleCheerClick(groupId, btnId) {
  if (selectMode) { toggleSelect(btnId); return; }
  const btn = findBtn(groupId, btnId);
  if (isEditMode()) { openEditPanelByBtn(groupId, btnId); return; }
  if (!btn || !btn.videoId) { showToast('먼저 YouTube URL을 설정하세요.'); return; }
  pendingCheer = null;
  setActiveInfo({ groupId, btnId, mode: 'cheer' });
  playVideoById(btn, btn.label);
}

function setActiveInfo(info) { activeInfo = info; renderActiveState(); }

function renderActiveState() {
  document.querySelectorAll('.pad-btn[data-bid], .player-card').forEach(el => {
    const gid = el.dataset.gid, bid = el.dataset.bid;
    const active = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === bid;
    el.classList.toggle('playing',          active && activeInfo.mode !== 'entrance');
    el.classList.toggle('entrance-playing', active && activeInfo.mode === 'entrance');
  });
  document.querySelectorAll('.player-action-btn').forEach(el => {
    const active = activeInfo && activeInfo.groupId === el.dataset.gid &&
                   activeInfo.btnId === el.dataset.bid && activeInfo.mode === el.dataset.mode;
    el.classList.toggle('entrance-active', el.dataset.mode === 'entrance' && active);
    el.classList.toggle('cheer-active',    el.dataset.mode === 'cheer'    && active);
  });
}

function updateNowPlaying(label) {
  const el = document.getElementById('now-playing');
  el.innerHTML = label ? `재생 중: <span>${label}</span>` : '재생 대기 중...';
}

// ══════════════════════════════════════════════════
// 데이터 헬퍼
// ══════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 10); }
function findGroup(gid) { return config.groups.find(g => g.id === gid); }
function findBtn(gid, bid) { const g = findGroup(gid); return g ? g.buttons.find(b => b.id === bid) : null; }
function currentGroup() { return findGroup(currentGroupId); }

// ══════════════════════════════════════════════════
// 데이터 로드/저장
// ══════════════════════════════════════════════════
async function loadPreset(name) {
  if (!confirm(`"${name}" 프리셋을 불러오면 현재 데이터가 교체됩니다. 계속할까요?`)) return;
  try {
    const res = await fetch(`./presets/${name}.json?_=` + Date.now());
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    if (!data || !Array.isArray(data.groups)) throw new Error('invalid');
    config = data;
    saveConfig();
    initCurrentGroup();
    renderAll();
    showToast(`${name} 프리셋을 불러왔습니다.`);
  } catch (e) {
    alert(`프리셋 "${name}"을 불러오지 못했습니다: ${e.message}`);
  }
}

async function loadConfig() {
  try {
    const res = await fetch('./config.json?_=' + Date.now());
    if (res.ok) {
      const r = await res.json();
      if (r && Array.isArray(r.groups)) { config = r; initCurrentGroup(); renderAll(); return; }
      if (r && Array.isArray(r.buttons)) { config = migrateLegacy(r); initCurrentGroup(); renderAll(); return; }
    }
  } catch (_) {}
  try {
    const s = localStorage.getItem('baseball-launchpad');
    if (s) { const p = JSON.parse(s); config = p.groups ? p : migrateLegacy(p); }
  } catch (_) {}
  if (!config.groups || !config.groups.length) config = defaultConfig();
  initCurrentGroup(); renderAll();
}

function migrateLegacy(old) {
  return { groups: [{ id: uid(), name: '기본 그룹', type: 'general', gridCols: old.gridCols || 4,
    buttons: (old.buttons || []).map(b => ({ ...b, id: b.id || uid() })) }] };
}

function defaultConfig() {
  return {
    groups: [
      { id: uid(), name: '팀 응원가', type: 'general', gridCols: 4,
        buttons: [{ id: uid(), label: '응원 시작!', videoId: DEFAULT_VIDEO, startSeconds: 0, endSeconds: 30, color: '#e74c3c' }] },
      { id: uid(), name: '선수', type: 'players', gridCols: 5, buttons: [
        { id: uid(), label: '김도영',   battingOrder: 1, videoId: '', startSeconds: 0, endSeconds: 30, color: '#e74c3c' },
        { id: uid(), label: '박찬호',   battingOrder: 2, videoId: '', startSeconds: 0, endSeconds: 30, color: '#e67e22' },
        { id: uid(), label: '나성범',   battingOrder: 3, videoId: '', startSeconds: 0, endSeconds: 30, color: '#f1c40f' },
        { id: uid(), label: '소크라테스', battingOrder: 4, videoId: '', startSeconds: 0, endSeconds: 30, color: '#2ecc71' },
        { id: uid(), label: '최형우',   battingOrder: 5, videoId: '', startSeconds: 0, endSeconds: 30, color: '#1abc9c' },
        { id: uid(), label: '황대인',   battingOrder: 6, videoId: '', startSeconds: 0, endSeconds: 30, color: '#3498db' },
        { id: uid(), label: '최원준',   battingOrder: 7, videoId: '', startSeconds: 0, endSeconds: 30, color: '#9b59b6' },
        { id: uid(), label: '한준수',   battingOrder: 8, videoId: '', startSeconds: 0, endSeconds: 30, color: '#e91e63' },
        { id: uid(), label: '이창진',   battingOrder: 9, videoId: '', startSeconds: 0, endSeconds: 30, color: '#ff5722' },
        { id: uid(), label: '양현종',   battingOrder: 0, videoId: '', startSeconds: 0, endSeconds: 30, color: '#607d8b' },
        { id: uid(), label: '이의리',   battingOrder: 0, videoId: '', startSeconds: 0, endSeconds: 30, color: '#607d8b' },
      ]},
      { id: uid(), name: '상황별', type: 'general', gridCols: 5, buttons: [] }
    ]
  };
}

function initCurrentGroup() {
  if (currentGroupId === ALL_TAB) return;
  if (!config.groups.length) return;
  if (!currentGroupId || !findGroup(currentGroupId)) currentGroupId = config.groups[0].id;
}

function saveConfig() { localStorage.setItem('baseball-launchpad', JSON.stringify(config)); }

// ══════════════════════════════════════════════════
// 렌더링
// ══════════════════════════════════════════════════
function renderAll() { renderTabs(); renderGrid(); }

function renderTabs() {
  const bar = document.getElementById('group-tabs');
  bar.innerHTML = '';
  const allTab = document.createElement('button');
  allTab.className = 'group-tab' + (currentGroupId === ALL_TAB ? ' active' : '');
  allTab.textContent = '전체';
  allTab.onclick = () => { currentGroupId = ALL_TAB; renderAll(); };
  bar.appendChild(allTab);

  config.groups.forEach(g => {
    const tab = document.createElement('button');
    tab.className = 'group-tab' + (g.id === currentGroupId ? ' active' : '');
    tab.dataset.gid = g.id;
    tab.innerHTML = `${escHtml(g.name)} <span class="tab-edit-icon">⋯</span>`;
    tab.onclick = e => {
      if (e.target.classList.contains('tab-edit-icon')) showTabContextMenu(e, g.id);
      else { currentGroupId = g.id; renderAll(); }
    };
    tab.oncontextmenu = e => { e.preventDefault(); showTabContextMenu(e, g.id); };
    bar.appendChild(tab);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-group-btn'; addBtn.textContent = '+ 그룹 추가'; addBtn.onclick = addGroup;
  bar.appendChild(addBtn);
}

function renderGrid() {
  const content  = document.getElementById('launchpad-content');
  const gcCtrl   = document.getElementById('grid-controls');
  content.innerHTML = '';

  if (currentGroupId === ALL_TAB) {
    document.getElementById('current-group-name').textContent = '전체 보기';
    gcCtrl.style.visibility = 'hidden';
    config.groups.forEach((g, idx) => {
      const hdr = document.createElement('div');
      hdr.className = 'group-section-header';
      hdr.textContent = g.name + (g.type === 'players' ? ' · 선수' : '');
      content.appendChild(hdr);
      const cols = g.gridCols || 4;
      if (g.type === 'players') renderPlayerGroup(g, content, cols);
      else renderGeneralGroup(g, content, cols);
    });
    return;
  }

  gcCtrl.style.visibility = 'visible';
  const g = currentGroup();
  if (!g) { document.getElementById('current-group-name').textContent = '런치패드'; return; }
  document.getElementById('current-group-name').textContent = g.name;
  document.getElementById('grid-cols').value = g.gridCols || 4;
  if (g.type === 'players') renderPlayerGroup(g, content, g.gridCols || 4);
  else renderGeneralGroup(g, content, g.gridCols || 4);
}

function renderGeneralGroup(g, container, cols) {
  const grid = document.createElement('div');
  grid.className = 'launchpad-grid';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  g.buttons.forEach(btn => grid.appendChild(makePad(btn, g.id)));
  if (!selectMode) {
    const add = document.createElement('button');
    add.className = 'pad-btn empty'; add.title = '새 버튼 추가'; add.textContent = '+';
    add.onclick = () => { currentGroupId = g.id; addButtonToCurrentGroup(); };
    grid.appendChild(add);
  }
  container.appendChild(grid);
}

function renderPlayerGroup(g, container, cols) {
  const starters = g.buttons.filter(b => b.battingOrder > 0).sort((a, b) => a.battingOrder - b.battingOrder);
  const bench    = g.buttons.filter(b => !b.battingOrder || b.battingOrder === 0);

  const divS = document.createElement('div');
  divS.className = 'section-divider';
  divS.textContent = `선발 (${starters.length}명)`;
  container.appendChild(divS);

  const gridS = document.createElement('div');
  gridS.className = 'launchpad-grid';
  gridS.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  starters.forEach(btn => gridS.appendChild(makePlayerCard(btn, g.id)));
  if (!selectMode) {
    const addS = document.createElement('button');
    addS.className = 'pad-btn empty'; addS.title = '선수 추가'; addS.textContent = '+';
    addS.onclick = () => { currentGroupId = g.id; addButtonToCurrentGroup(); };
    gridS.appendChild(addS);
  }
  container.appendChild(gridS);

  const divB = document.createElement('div');
  divB.className = 'section-divider'; divB.style.marginTop = '12px';
  divB.textContent = `벤치 (${bench.length}명)`;
  container.appendChild(divB);

  const gridB = document.createElement('div');
  gridB.className = 'launchpad-grid';
  gridB.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  bench.forEach(btn => gridB.appendChild(makePlayerCard(btn, g.id)));
  container.appendChild(gridB);
}

function makePad(btn, gid) {
  const isPopup  = btn.videoId && popupSet.has(btn.videoId);
  const isActive = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === btn.id;
  const isSel    = selectedIds.has(btn.id);

  const el = document.createElement('button');
  el.className = 'pad-btn' +
    (isActive && activeInfo.mode !== 'entrance' ? ' playing' : '') +
    (isSel ? ' selected' : '');
  el.style.setProperty('--accent', btn.color || '#e74c3c');
  el.dataset.gid = gid; el.dataset.bid = btn.id;

  if (isPopup) {
    const b = document.createElement('div'); b.className = 'pad-badge popup'; b.textContent = '팝업재생'; el.appendChild(b);
  }
  const label = document.createElement('div'); label.className = 'pad-label'; label.textContent = btn.label || '(이름 없음)';
  const time  = document.createElement('div'); time.className = 'pad-time';
  if (btn.startSeconds != null && btn.endSeconds != null)
    time.textContent = `${fmt(btn.startSeconds)} – ${fmt(btn.endSeconds)}`;
  const edit = document.createElement('button');
  edit.className = 'pad-edit-btn'; edit.title = '편집'; edit.textContent = '✏';
  edit.onclick = e => { e.stopPropagation(); openEditPanelByBtn(gid, btn.id); };

  el.append(label, time, edit);
  el.onclick = () => handlePadClick(gid, btn.id);
  return el;
}

function makePlayerCard(btn, gid) {
  const hasEntrance = !!(btn.entrance && btn.entrance.videoId);
  const isActive    = activeInfo && activeInfo.groupId === gid && activeInfo.btnId === btn.id;
  const isSel       = selectedIds.has(btn.id);

  if (!hasEntrance) {
    const pad = makePad(btn, gid);
    if (btn.battingOrder) {
      const ord = document.createElement('div'); ord.className = 'batting-order-top';
      ord.textContent = `${btn.battingOrder}번`; pad.appendChild(ord);
    }
    if (btn.number != null) {
      const jerseyEl = document.createElement('div'); jerseyEl.className = 'player-order-num';
      jerseyEl.textContent = btn.number;
      const editBtn = pad.querySelector('.pad-edit-btn');
      pad.insertBefore(jerseyEl, editBtn);
    }
    return pad;
  }

  const isEntrance = isActive && activeInfo.mode === 'entrance';
  const isCheer    = isActive && (activeInfo.mode === 'cheer' || !activeInfo.mode);

  const card = document.createElement('div');
  card.className = 'player-card' +
    (isEntrance ? ' entrance-playing' : '') + (isCheer ? ' playing' : '') + (isSel ? ' selected' : '');
  card.style.setProperty('--accent', btn.color || '#e74c3c');
  card.dataset.gid = gid; card.dataset.bid = btn.id;

  if (btn.battingOrder) {
    const ord = document.createElement('div'); ord.className = 'batting-order-top';
    ord.textContent = `${btn.battingOrder}번`; card.appendChild(ord);
  }
  const top = document.createElement('div'); top.className = 'player-card-top'; top.title = '클릭: 등장→응원 연결';
  const jerseyEl = document.createElement('div'); jerseyEl.className = 'player-order-num';
  jerseyEl.textContent = btn.number != null ? btn.number : '';
  const nameEl  = document.createElement('div'); nameEl.className = 'player-name'; nameEl.textContent = btn.label || '(이름 없음)';
  top.append(jerseyEl, nameEl);
  top.onclick = () => handleChainClick(gid, btn.id);

  const actions = document.createElement('div'); actions.className = 'player-card-actions';
  const entBtn = document.createElement('button');
  entBtn.className = 'player-action-btn' + (isEntrance ? ' entrance-active' : '');
  entBtn.dataset.gid = gid; entBtn.dataset.bid = btn.id; entBtn.dataset.mode = 'entrance';
  entBtn.innerHTML = '<span>🎵</span><span>등장</span>';
  entBtn.onclick = e => { e.stopPropagation(); handleEntranceClick(gid, btn.id); };

  const cheBtn = document.createElement('button');
  cheBtn.className = 'player-action-btn' + (isCheer ? ' cheer-active' : '');
  cheBtn.dataset.gid = gid; cheBtn.dataset.bid = btn.id; cheBtn.dataset.mode = 'cheer';
  cheBtn.innerHTML = '<span>⚾</span><span>응원</span>';
  cheBtn.onclick = e => { e.stopPropagation(); handleCheerClick(gid, btn.id); };
  actions.append(entBtn, cheBtn);

  const edit = document.createElement('button');
  edit.className = 'pad-edit-btn'; edit.title = '편집'; edit.textContent = '✏';
  edit.onclick = e => { e.stopPropagation(); openEditPanelByBtn(gid, btn.id); };

  card.append(top, actions, edit);
  return card;
}

function fmt(sec) {
  if (sec == null || isNaN(sec)) return '?';
  return `${Math.floor(sec / 60)}:${String(Math.floor(sec % 60)).padStart(2, '0')}`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════
// 탭 컨텍스트 메뉴 / 그룹 관리
// ══════════════════════════════════════════════════
function showTabContextMenu(e, gid) {
  e.preventDefault();
  const menu = document.getElementById('ctx-menu'); menu.innerHTML = '';
  const g = findGroup(gid);
  const mk = (text, cls, fn) => {
    const b = document.createElement('button'); b.textContent = text; if (cls) b.className = cls;
    b.onclick = () => { hideCtxMenu(); fn(); }; menu.appendChild(b);
  };
  mk('✏ 이름 변경', '', () => renameGroup(gid));
  mk(g.type === 'players' ? '🔄 일반 그룹으로 변경' : '🔄 선수 그룹으로 변경', '', () => toggleGroupType(gid));
  mk('🗑 그룹 삭제', 'danger', () => deleteGroup(gid));
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
  requestAnimationFrame(() => {
    const r = menu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  menu.style.left = (window.innerWidth  - r.width  - 4) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top  = (window.innerHeight - r.height - 4) + 'px';
  });
}
function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { hideCtxMenu(); if (selectMode) exitSelectMode(); else ctrlStop(); } });

function addGroup() {
  const name = prompt('그룹 이름:', '새 그룹'); if (!name) return;
  const g = { id: uid(), name: name.trim(), type: 'general', gridCols: 5, buttons: [] };
  config.groups.push(g); currentGroupId = g.id; saveConfig(); renderAll();
  showToast(`'${g.name}' 그룹이 추가되었습니다.`);
}
function renameGroup(gid) {
  const g = findGroup(gid); if (!g) return;
  const name = prompt('새 그룹 이름:', g.name); if (!name) return;
  g.name = name.trim(); saveConfig(); renderAll();
}
function toggleGroupType(gid) {
  const g = findGroup(gid); if (!g) return;
  g.type = g.type === 'players' ? 'general' : 'players'; saveConfig(); renderAll();
  showToast(`'${g.name}' 그룹 타입이 변경되었습니다.`);
}
function deleteGroup(gid) {
  if (config.groups.length <= 1) { showToast('마지막 그룹은 삭제할 수 없습니다.'); return; }
  const g = findGroup(gid);
  if (!confirm(`'${g.name}' 그룹과 모든 버튼을 삭제할까요?`)) return;
  config.groups = config.groups.filter(x => x.id !== gid);
  if (currentGroupId === gid) currentGroupId = config.groups[0].id;
  saveConfig(); renderAll(); showToast('그룹이 삭제되었습니다.');
}

// ══════════════════════════════════════════════════
// 버튼 추가
// ══════════════════════════════════════════════════
function addButtonToCurrentGroup() {
  const g = (currentGroupId === ALL_TAB) ? config.groups[0] : currentGroup(); if (!g) return;
  const isP = g.type === 'players';
  const btn = { id: uid(), label: isP ? '새 선수' : '새 버튼', videoId: '', startSeconds: 0, endSeconds: 60,
    color: COLORS[Math.floor(Math.random() * COLORS.length)] };
  if (isP) btn.battingOrder = 0;
  g.buttons.push(btn);
  if (currentGroupId === ALL_TAB) currentGroupId = g.id;
  saveConfig(); renderAll(); openEditPanelByBtn(g.id, btn.id);
  showToast('새 버튼이 추가되었습니다.');
}

// ══════════════════════════════════════════════════
// 편집 패널
// ══════════════════════════════════════════════════
function openEditPanelByBtn(gid, bid) {
  const btn = findBtn(gid, bid); if (!btn) return;
  editingBtnId = bid;
  // 패널이 닫혀있으면 열기
  const panel = document.getElementById('right-panel');
  if (panel.classList.contains('collapsed')) {
    panel.classList.remove('collapsed');
    document.getElementById('panel-toggle').textContent = '◀';
    document.getElementById('panel-toggle').title = '패널 닫기 (재생 모드로)';
  }
  const g = findGroup(gid);
  document.getElementById('edit-placeholder').style.display = 'none';
  document.getElementById('edit-form').style.display = 'block';
  document.getElementById('edit-slot-label').textContent = btn.label || '(이름 없음)';
  document.getElementById('edit-label').value  = btn.label || '';
  document.getElementById('edit-url').value    = btn.videoId || '';
  document.getElementById('edit-start').value  = btn.startSeconds != null ? fmt(btn.startSeconds) : '';
  document.getElementById('edit-end').value    = btn.endSeconds   != null ? fmt(btn.endSeconds)   : '';

  const sel = document.getElementById('edit-group'); sel.innerHTML = '';
  config.groups.forEach(grp => {
    const opt = document.createElement('option'); opt.value = grp.id; opt.textContent = grp.name;
    if (grp.id === gid) opt.selected = true; sel.appendChild(opt);
  });

  updatePlayerFields(g);
  if (g && g.type === 'players') {
    document.getElementById('edit-jersey-number').value = btn.number ?? '';
    document.getElementById('edit-batting-order').value = btn.battingOrder ?? 0;
    const hasE = !!(btn.entrance && btn.entrance.videoId);
    document.getElementById('entrance-enabled').checked = hasE;
    document.getElementById('entrance-fields').style.display = hasE ? '' : 'none';
    document.getElementById('entrance-url').value   = hasE ? btn.entrance.videoId   || '' : '';
    document.getElementById('entrance-start').value = hasE && btn.entrance.startSeconds != null ? fmt(btn.entrance.startSeconds) : '';
    document.getElementById('entrance-end').value   = hasE && btn.entrance.endSeconds   != null ? fmt(btn.entrance.endSeconds)   : '';
  }
  renderSwatches(btn.color);
  switchTab('edit');
}

function onEditGroupChange() { updatePlayerFields(findGroup(document.getElementById('edit-group').value)); }

function updatePlayerFields(g) {
  const isP = !!(g && g.type === 'players');
  document.getElementById('edit-player-fields-group').style.display = isP ? '' : 'none';
  document.getElementById('entrance-section').style.display         = isP ? '' : 'none';
  document.getElementById('cheer-section-title').textContent        = isP ? '응원가' : '재생 정보';
  if (!isP) { document.getElementById('entrance-enabled').checked = false; document.getElementById('entrance-fields').style.display = 'none'; }
}

function toggleEntranceFields() {
  const enabled = document.getElementById('entrance-enabled').checked;
  document.getElementById('entrance-fields').style.display = enabled ? '' : 'none';
  if (!enabled) { document.getElementById('cut-tool').style.display = 'none'; }
  // 등장곡 URL이 비어있으면 응원가 URL로 자동 채움 (힌트 표시만)
  // 실제 저장 시 빈 값이면 응원가 videoId를 사용하도록 saveEdit에서 처리
}

function showCutTool() {
  const cutTool = document.getElementById('cut-tool');
  cutTool.style.display = cutTool.style.display === 'none' ? '' : 'none';
  if (cutTool.style.display !== 'none') {
    document.getElementById('cut-time').focus();
  }
}

function applyCut() {
  const startRaw = document.getElementById('edit-start').value.trim();
  const endRaw   = document.getElementById('edit-end').value.trim();
  const cutRaw   = document.getElementById('cut-time').value.trim();

  const start = parseTime(startRaw);
  const end   = parseTime(endRaw);
  const cut   = parseTime(cutRaw);

  if (start == null || end == null) { showToast('먼저 응원가 시작/종료 시간을 입력하세요.', true); return; }
  if (cut == null) { showToast('나누기 시점을 입력하세요. (예: 0:20)', true); return; }
  if (cut <= start) { showToast('나누기 시점은 시작 시간보다 커야 합니다.', true); return; }
  if (cut >= end)   { showToast('나누기 시점은 종료 시간보다 작아야 합니다.', true); return; }

  // 등장곡: start ~ cut (응원가와 같은 URL)
  document.getElementById('entrance-enabled').checked = true;
  document.getElementById('entrance-fields').style.display = '';
  document.getElementById('entrance-url').value   = ''; // 빈 값 = 응원가 URL 공유
  document.getElementById('entrance-start').value = fmt(start);
  document.getElementById('entrance-end').value   = fmt(cut);

  // 응원가: cut ~ end
  document.getElementById('edit-start').value = fmt(cut);
  // edit-end는 그대로

  document.getElementById('cut-tool').style.display = 'none';
  showToast(`등장곡 ${fmt(start)}–${fmt(cut)} / 응원가 ${fmt(cut)}–${fmt(end)} 로 분리됐습니다.`);
}

function renderSwatches(selected) {
  const c = document.getElementById('color-swatches'); c.innerHTML = '';
  COLORS.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (col === selected ? ' selected' : '');
    sw.style.background = col;
    sw.onclick = () => { c.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected')); sw.classList.add('selected'); };
    c.appendChild(sw);
  });
}

// ── 저장 (검증 + 중복 덮어쓰기) ──
function saveEdit() {
  if (!editingBtnId) return;
  const targetGid = document.getElementById('edit-group').value;
  const label     = document.getElementById('edit-label').value.trim();
  const urlInput  = document.getElementById('edit-url').value.trim();
  const startRaw  = document.getElementById('edit-start').value.trim();
  const endRaw    = document.getElementById('edit-end').value.trim();
  const colorEl   = document.querySelector('.color-swatch.selected');

  if (!label) { showToast('이름을 입력하세요.', true); return; }

  // 중복 이름 → 덮어쓰기 확인
  const targetGroup = findGroup(targetGid);
  if (targetGroup) {
    const dup = targetGroup.buttons.find(b => b.id !== editingBtnId && b.label === label);
    if (dup) {
      if (!confirm(`'${label}'이(가) 이미 같은 그룹에 있습니다.\n기존 버튼을 삭제하고 덮어쓸까요?`)) return;
      targetGroup.buttons = targetGroup.buttons.filter(b => b.id !== dup.id);
    }
  }

  const videoId = urlInput ? parseVideoId(urlInput) : '';
  if (urlInput && !videoId) { showToast('올바른 YouTube URL이 아닙니다.', true); return; }

  const start = parseTime(startRaw);
  const end   = parseTime(endRaw);
  if (start == null) { showToast('시작 시간 형식 오류 (예: 1:30)', true); return; }
  if (end   == null) { showToast('종료 시간 형식 오류 (예: 2:00)', true); return; }
  if (end <= start)  { showToast('종료 시간은 시작 시간보다 커야 합니다.', true); return; }
  if (end - start < 1) { showToast('구간이 너무 짧습니다 (최소 1초).', true); return; }
  if (end - start > 600 && !confirm(`구간이 ${Math.round((end-start)/60)}분입니다. 계속하시겠습니까?`)) return;

  let srcGroup = null, btn = null;
  for (const g of config.groups) { const b = g.buttons.find(b => b.id === editingBtnId); if (b) { srcGroup = g; btn = b; break; } }
  if (!btn) return;

  if (btn.videoId !== videoId) popupSet.delete(btn.videoId);
  btn.label = label; btn.videoId = videoId; btn.startSeconds = start; btn.endSeconds = end;
  if (colorEl) btn.color = colorEl.style.background;

  if (targetGroup && targetGroup.type === 'players') {
    const jn = parseInt(document.getElementById('edit-jersey-number').value);
    if (!isNaN(jn) && jn >= 0) btn.number = jn; else delete btn.number;
    btn.battingOrder = parseInt(document.getElementById('edit-batting-order').value) || 0;
    if (document.getElementById('entrance-enabled').checked) {
      const eUrl = document.getElementById('entrance-url').value.trim();
      const eSt  = parseTime(document.getElementById('entrance-start').value.trim());
      const eEn  = parseTime(document.getElementById('entrance-end').value.trim());
      // URL 비어있으면 응원가와 동일 영상 사용
      const eVid = eUrl ? parseVideoId(eUrl) : (videoId || null);
      if (eUrl && !parseVideoId(eUrl)) { showToast('등장곡 URL이 올바르지 않습니다.', true); return; }
      if (eVid) {
        if (eEn != null && eSt != null && eEn <= eSt) { showToast('등장곡: 종료 > 시작 이어야 합니다.', true); return; }
        if (eEn != null && eSt != null && eEn - eSt < 1) { showToast('등장곡 구간이 너무 짧습니다.', true); return; }
        btn.entrance = { videoId: eVid, startSeconds: eSt || 0, endSeconds: eEn };
      } else { delete btn.entrance; }
    } else { delete btn.entrance; }
  } else { delete btn.battingOrder; delete btn.entrance; }

  if (srcGroup && srcGroup.id !== targetGid && targetGroup) {
    srcGroup.buttons = srcGroup.buttons.filter(b => b.id !== btn.id);
    targetGroup.buttons.push(btn); currentGroupId = targetGid;
  }

  saveConfig(); renderAll();
  document.getElementById('edit-slot-label').textContent = label;
  showToast('저장되었습니다!');
}

function deleteButton() {
  if (!editingBtnId) return;
  if (!confirm('이 버튼을 삭제할까요?')) return;
  for (const g of config.groups) {
    const idx = g.buttons.findIndex(b => b.id === editingBtnId);
    if (idx !== -1) { g.buttons.splice(idx, 1); break; }
  }
  if (activeInfo && activeInfo.btnId === editingBtnId) ctrlStop();
  editingBtnId = null; saveConfig(); renderAll();
  document.getElementById('edit-placeholder').style.display = '';
  document.getElementById('edit-form').style.display = 'none';
  showToast('삭제되었습니다.');
}

// ══════════════════════════════════════════════════
// 타임스탬프 파서
// ══════════════════════════════════════════════════
function populateParserGroupSelect() {
  const sel = document.getElementById('parser-group'); const prev = sel.value; sel.innerHTML = '';
  config.groups.forEach(g => {
    const opt = document.createElement('option'); opt.value = g.id;
    opt.textContent = g.name + (g.type === 'players' ? ' (선수)' : '');
    if (g.id === prev || (currentGroupId !== ALL_TAB && g.id === currentGroupId)) opt.selected = true;
    sel.appendChild(opt);
  });
}

function parseTimestamps(text) {
  const results = [];
  const tsCore = '\\d+:\\d{2}(?::\\d{2})?';
  const tsRe   = new RegExp(`(${tsCore})`, 'g');

  for (const rawLine of text.replace(/\r/g, '').split('\n')) {
    const line = rawLine.trim();
    if (!line) continue;

    // 줄에서 타임스탬프 전체 추출
    const matches = [...line.matchAll(tsRe)];
    if (!matches.length) continue;

    const first = matches[0];
    const start = parseTime(first[1]);
    if (start == null) continue;

    // 두 번째 타임스탬프가 5자 이내에 있으면 범위로 인식
    let end = null;
    let labelStart = first.index + first[0].length;
    if (matches.length >= 2) {
      const second = matches[1];
      if (second.index - labelStart <= 5) {
        end = parseTime(second[1]);
        labelStart = second.index + second[0].length;
      }
    }

    // 구분자 제거 후 레이블 추출
    const label = line.slice(labelStart).replace(/^[\s:\-\.\]\)]+/, '').trim();
    if (!label) continue;

    results.push({ startSeconds: start, endSeconds: end, label });
  }
  return results;
}

function runParser() {
  const urlInput  = document.getElementById('parser-url').value.trim();
  const text      = document.getElementById('parser-text').value;
  const targetGid = document.getElementById('parser-group').value;
  const videoId   = urlInput ? parseVideoId(urlInput) : null;
  if (urlInput && !videoId) { showToast('올바른 YouTube URL이 아닙니다.', true); return; }
  const targetGroup = findGroup(targetGid);
  if (!targetGroup) { showToast('대상 그룹을 선택하세요.', true); return; }
  const entries = parseTimestamps(text);
  if (!entries.length) { showToast('타임스탬프를 찾을 수 없습니다.', true); return; }

  // 종료 시간 없으면 다음 항목 시작 시간 사용
  for (let i = 0; i < entries.length; i++) {
    if (entries[i].endSeconds == null)
      entries[i].endSeconds = i + 1 < entries.length ? entries[i+1].startSeconds : entries[i].startSeconds + 60;
  }

  let added = 0, overwritten = 0, skipped = 0;
  entries.forEach((entry, i) => {
    if (entry.endSeconds - entry.startSeconds < 1) { skipped++; return; }
    const dup = targetGroup.buttons.find(b => b.label === entry.label);
    if (dup) {
      // 덮어쓰기 (파서에서는 자동 덮어쓰기, 나중에 confirm 옵션 추가 가능)
      dup.videoId = videoId || dup.videoId;
      dup.startSeconds = entry.startSeconds; dup.endSeconds = entry.endSeconds;
      overwritten++;
    } else {
      targetGroup.buttons.push({
        id: uid(), label: entry.label, videoId: videoId || '',
        startSeconds: entry.startSeconds, endSeconds: entry.endSeconds,
        color: COLORS[i % COLORS.length],
        ...(targetGroup.type === 'players' ? { battingOrder: 0 } : {}),
      });
      added++;
    }
  });

  currentGroupId = targetGid; saveConfig(); renderAll();
  const parts = [];
  if (added)      parts.push(`${added}개 생성`);
  if (overwritten) parts.push(`${overwritten}개 덮어씀`);
  if (skipped)    parts.push(`${skipped}개 건너뜀`);
  showToast(parts.join(', '));
}

// ══════════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════════
function parseVideoId(s) {
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  for (const re of [/youtu\.be\/([a-zA-Z0-9_-]{11})/, /[?&]v=([a-zA-Z0-9_-]{11})/, /embed\/([a-zA-Z0-9_-]{11})/, /shorts\/([a-zA-Z0-9_-]{11})/])
    { const m = s.match(re); if (m) return m[1]; }
  return null;
}

function parseTime(raw) {
  if (raw == null) return null;
  raw = String(raw).trim(); if (!raw) return 0;
  if (raw.includes(':')) {
    const p = raw.split(':').map(Number); if (p.some(isNaN)) return null;
    if (p.length === 2) return p[0]*60+p[1]; if (p.length === 3) return p[0]*3600+p[1]*60+p[2]; return null;
  }
  const n = parseFloat(raw); return isNaN(n) ? null : n;
}

function setGridCols(v) {
  const g = currentGroup(); if (g) { g.gridCols = parseInt(v); saveConfig(); renderAll(); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'parser') populateParserGroupSelect();
}

// ══════════════════════════════════════════════════
// 내보내기 / 가져오기
// ══════════════════════════════════════════════════
function exportConfig() {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' })),
    download: 'baseball-launchpad.json'
  }); a.click(); showToast('설정 파일이 다운로드되었습니다.');
}
function exportToTextarea() { document.getElementById('export-area').value = JSON.stringify(config, null, 2); showToast('JSON이 생성되었습니다.'); }
function copyExport() {
  const t = document.getElementById('export-area').value;
  if (!t) { showToast('먼저 "JSON 생성"을 누르세요.'); return; }
  navigator.clipboard.writeText(t).then(() => showToast('클립보드에 복사됐습니다!'));
}
function applyImport() {
  const t = document.getElementById('import-area').value.trim(); if (!t) { showToast('JSON을 붙여넣어 주세요.'); return; }
  try {
    const d = JSON.parse(t); config = d.groups ? d : (d.buttons ? migrateLegacy(d) : (() => { throw 0; })());
    initCurrentGroup(); saveConfig(); renderAll();
    showToast(`${config.groups.reduce((n,g)=>n+g.buttons.length,0)}개 버튼을 가져왔습니다!`); switchTab('edit');
  } catch { showToast('올바른 JSON 형식이 아닙니다.', true); }
}
function triggerImport() { document.getElementById('import-file').click(); }
function importFromFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result); config = d.groups ? d : (d.buttons ? migrateLegacy(d) : (() => { throw 0; })());
      initCurrentGroup(); saveConfig(); renderAll();
      showToast(`${config.groups.reduce((n,g)=>n+g.buttons.length,0)}개 버튼을 가져왔습니다!`);
    } catch { showToast('파일 읽기 실패', true); }
    e.target.value = '';
  }; r.readAsText(file);
}
function resetConfig() {
  if (!confirm('모든 설정을 초기화할까요?')) return;
  config = defaultConfig(); initCurrentGroup(); editingBtnId = null; saveConfig(); renderAll();
  document.getElementById('edit-placeholder').style.display = '';
  document.getElementById('edit-form').style.display = 'none';
  showToast('초기화되었습니다.');
}

// ══════════════════════════════════════════════════
// 토스트
// ══════════════════════════════════════════════════
let _toastTimer;
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.className = isErr ? 'err show' : 'show';
  clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════
// 시작
// ══════════════════════════════════════════════════
renderSwatches(COLORS[0]);
loadConfig();
</script>
